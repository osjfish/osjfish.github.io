<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生辩论赛计票系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .vote-handle {
            /* 移除 transition 确保拖拽跟手 */
            pointer-events: none;
        }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .lucide { stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke: currentColor; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    iconRef.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                    window.lucide.createIcons({ 
                        attrs: { class: className }, 
                        nameAttr: 'data-lucide',
                        root: iconRef.current
                    });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const STORAGE_KEY = 'debate_pro_v5';
        const SESSIONS_KEY = 'debate_sessions_v5';

        function App() {
            const [view, setView] = useState('setup');
            const [currentRound, setCurrentRound] = useState(0);
            const [topic, setTopic] = useState('');
            const [proName, setProName] = useState('正方');
            const [conName, setConName] = useState('反方');
            const [totalVoters, setTotalVoters] = useState(100);
            const [points, setPoints] = useState([
                { text: '', owner: 'pro', proVotes: 50 },
                { text: '', owner: 'con', proVotes: 50 },
                { text: '', owner: 'pro', proVotes: 50 },
                { text: '', owner: 'con', proVotes: 50 }
            ]);
            const [finalVote, setFinalVote] = useState(50);
            const [sessions, setSessions] = useState([]);
            const [showHistory, setShowHistory] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const saved = localStorage.getItem(SESSIONS_KEY);
                if (saved) try { setSessions(JSON.parse(saved)); } catch(e){}
                const current = localStorage.getItem(STORAGE_KEY);
                if (current) {
                    try {
                        const d = JSON.parse(current);
                        setTopic(d.topic || '');
                        setProName(d.proName || '正方');
                        setConName(d.conName || '反方');
                        setTotalVoters(d.totalVoters || 100);
                        setPoints(d.points || points);
                        setView(d.view || 'setup');
                        setCurrentRound(d.currentRound || 0);
                        setFinalVote(d.finalVote || 50);
                    } catch(e){}
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ topic, proName, conName, totalVoters, points, view, currentRound, finalVote }));
            }, [topic, proName, conName, totalVoters, points, view, currentRound, finalVote]);

            // Clamp votes when totalVoters changes to prevent negative counts
            useEffect(() => {
                const clamped = points.map(p => ({
                    ...p,
                    proVotes: Math.max(0, Math.min(totalVoters, p.proVotes))
                }));
                if (JSON.stringify(clamped) !== JSON.stringify(points)) {
                    setPoints(clamped);
                }
                if (finalVote > totalVoters) setFinalVote(totalVoters);
            }, [totalVoters]);

            useEffect(() => {
                localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
            }, [sessions]);

            const results = useMemo(() => {
                let proRounds = 0, conRounds = 0, proTotalVotes = 0, conTotalVotes = 0;
                points.forEach(p => {
                    const conVotes = totalVoters - p.proVotes;
                    if (p.proVotes > conVotes) proRounds++; else if (conVotes > p.proVotes) conRounds++;
                    proTotalVotes += p.proVotes; conTotalVotes += conVotes;
                });
                let winner = proRounds > conRounds ? 'pro' : (conRounds > proRounds ? 'con' : (proTotalVotes > conTotalVotes ? 'pro' : (conTotalVotes > proTotalVotes ? 'con' : 'tie')));
                return { proRounds, conRounds, proTotalVotes, conTotalVotes, winner };
            }, [points, totalVoters]);

            const setProVotesSafe = (idx, val) => {
                const n = [...points];
                n[idx].proVotes = Math.max(0, Math.min(totalVoters, val));
                setPoints(n);
            };

            const saveToHistory = () => {
                if (!topic) return;
                const newSession = {
                    id: Date.now().toString(),
                    topic, proName, conName, totalVoters, points, finalVote,
                    winner: results.winner,
                    timestamp: Date.now()
                };
                setSessions([newSession, ...sessions]);
            };

            const loadSession = (s) => {
                setTopic(s.topic);
                setProName(s.proName);
                setConName(s.conName);
                setTotalVoters(s.totalVoters);
                setPoints(s.points);
                setFinalVote(s.finalVote || Math.floor(s.totalVoters / 2));
                setView('summary');
                setShowHistory(false);
            };

            const exportExcel = () => {
                const detailData = points.map((p, i) => ({
                    '环节': `第${i+1}场 (${p.owner === 'pro' ? '正方' : '反方'}分论点)`,
                    '论点内容': p.text,
                    '正方得票': p.proVotes,
                    '反方得票': totalVoters - p.proVotes,
                    '胜方': p.proVotes > (totalVoters - p.proVotes) ? '正方' : (p.proVotes < (totalVoters - p.proVotes) ? '反方' : '平局')
                }));
                
                const summaryData = [{
                    '辩题': topic,
                    '正方选手': proName,
                    '反方选手': conName,
                    '总人数': totalVoters,
                    '正方胜场': results.proRounds,
                    '反方胜场': results.conRounds,
                    '正方总票': results.proTotalVotes,
                    '反方总票': results.conTotalVotes,
                    '最终结果': results.winner === 'pro' ? '正方胜' : (results.winner === 'con' ? '反方胜' : '平局'),
                    '终极投票(正方)': finalVote,
                    '终极投票(反方)': totalVoters - finalVote
                }];

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detailData), '辩论详情');
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summaryData), '比赛总结');
                XLSX.writeFile(wb, `辩论赛_${topic || '记录'}.xlsx`);
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const wb = XLSX.read(evt.target.result, { type: 'binary' });
                        const summary = XLSX.utils.sheet_to_json(wb.Sheets['比赛总结'])[0];
                        if (summary) {
                            setTopic(summary.辩题 || '');
                            setProName(summary.正方选手 || '正方');
                            setConName(summary.反方选手 || '反方');
                            setTotalVoters(summary.总人数 || 100);
                            setFinalVote(summary['终极投票(正方)'] || 50);
                        }
                        const detail = XLSX.utils.sheet_to_json(wb.Sheets['辩论详情']);
                        if (detail && detail.length >= 4) {
                            setPoints(detail.slice(0, 4).map((d, i) => ({
                                text: d.论点内容 || '',
                                owner: i % 2 === 0 ? 'pro' : 'con',
                                proVotes: Math.max(0, Math.min(summary?.总人数 || 100, d.正方得票 || 0))
                            })));
                        }
                        alert('导入成功');
                    } catch(e) { alert('导入失败，请检查文件格式'); }
                };
                reader.readAsBinaryString(file);
            };

            const renderSetup = () => (
                <div className="space-y-6 fade-in">
                    <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 grid md:grid-cols-3 gap-6">
                        <div className="md:col-span-2 space-y-1">
                            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400">主辩题</label>
                            <input value={topic} onChange={e => setTopic(e.target.value)} className="w-full text-lg font-bold border-b border-slate-100 focus:border-indigo-500 outline-none pb-1" placeholder="输入辩题..." />
                        </div>
                        <div className="space-y-1">
                            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400">观众人数（总投票数）</label>
                            <input type="number" value={totalVoters} onChange={e => setTotalVoters(parseInt(e.target.value) || 0)} className="w-full text-lg font-bold border-b border-slate-100 focus:border-indigo-500 outline-none pb-1" />
                        </div>
                        <div className="space-y-1">
                            <label className="text-[10px] font-bold uppercase tracking-wider text-blue-500">正方选手</label>
                            <input value={proName} onChange={e => setProName(e.target.value)} className="w-full font-bold border-b border-slate-100 focus:border-blue-500 outline-none pb-1" />
                        </div>
                        <div className="space-y-1">
                            <label className="text-[10px] font-bold uppercase tracking-wider text-red-500">反方选手</label>
                            <input value={conName} onChange={e => setConName(e.target.value)} className="w-full font-bold border-b border-slate-100 focus:border-red-500 outline-none pb-1" />
                        </div>
                    </div>

                    <div className="grid md:grid-cols-2 gap-4">
                        {points.map((p, i) => (
                            <div key={i} className={`p-4 rounded-2xl border ${p.owner === 'pro' ? 'bg-blue-50/50 border-blue-100' : 'bg-red-50/50 border-red-100'}`}>
                                <label className={`text-[10px] font-bold uppercase mb-2 block ${p.owner === 'pro' ? 'text-blue-500' : 'text-red-500'}`}>
                                    {p.owner === 'pro' ? '正方' : '反方'} 分论点 {Math.ceil((i+1)/2)}
                                </label>
                                <textarea value={p.text} onChange={e => { const n = [...points]; n[i].text = e.target.value; setPoints(n); }} className="w-full h-20 bg-white rounded-xl p-3 text-sm border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 resize-none" placeholder="输入论点内容..." />
                            </div>
                        ))}
                    </div>

                    <div className="flex justify-center">
                        <button onClick={() => { if(!topic || points.some(p => !p.text)) return alert('请填写完整辩题和所有分论点'); setView('debate'); setCurrentRound(0); }} className="px-12 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">开始正式比赛</button>
                    </div>
                </div>
            );

            const renderDebate = () => {
                const p = points[currentRound];
                const proPercent = (p.proVotes / totalVoters) * 100;
                return (
                    <div className="max-w-3xl mx-auto space-y-6 fade-in">
                        <div className="flex gap-2">
                            {[0,1,2,3].map(i => <div key={i} className={`flex-1 h-1.5 rounded-full transition-all ${i <= currentRound ? (points[i].owner === 'pro' ? 'bg-blue-500' : 'bg-red-500') : 'bg-slate-200'}`} />)}
                        </div>

                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="bg-slate-900 p-6 text-center">
                                <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1">主辩题</span>
                                <h2 className="text-xl font-bold text-white">{topic}</h2>
                            </div>

                            <div className="p-8 space-y-10">
                                <div className="text-center space-y-3">
                                    <div className={`inline-block px-3 py-0.5 rounded-full text-[10px] font-bold uppercase ${p.owner === 'pro' ? 'bg-blue-100 text-blue-600' : 'bg-red-100 text-red-600'}`}>
                                        第 {currentRound + 1} 场：{p.owner === 'pro' ? '正方分论点' : '反方分论点'}
                                    </div>
                                    <h3 className="text-2xl font-bold text-slate-800 leading-tight">“ {p.text} ”</h3>
                                </div>

                                <div className="bg-slate-50 rounded-2xl p-8 space-y-8 border border-slate-100">
                                    <div className="flex justify-between items-center">
                                        <div className="space-y-2">
                                            <span className="text-[10px] font-bold text-blue-600 uppercase block">{proName}</span>
                                            <div className="flex items-center gap-2">
                                                <div className="text-5xl font-black font-mono text-blue-700 tracking-tighter">{p.proVotes}</div>
                                                <div className="flex flex-col gap-1">
                                                    <button onClick={() => setProVotesSafe(currentRound, p.proVotes + 1)} className="p-1 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200 transition-colors shadow-sm"><Icon name="Plus" className="w-3 h-3" /></button>
                                                    <button onClick={() => setProVotesSafe(currentRound, p.proVotes + 5)} className="px-1 py-0.5 text-[10px] font-bold bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors shadow-sm">+5</button>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-[10px] font-bold text-slate-400 uppercase mb-1">得票率</div>
                                            <div className="text-xl font-bold font-mono text-slate-700">{Math.round(proPercent)}% : {Math.round(100-proPercent)}%</div>
                                        </div>
                                        <div className="space-y-2 text-right">
                                            <span className="text-[10px] font-bold text-red-600 uppercase block">{conName}</span>
                                            <div className="flex items-center gap-2 justify-end">
                                                <div className="flex flex-col gap-1">
                                                    <button onClick={() => setProVotesSafe(currentRound, p.proVotes - 1)} className="p-1 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition-colors shadow-sm"><Icon name="Plus" className="w-3 h-3" /></button>
                                                    <button onClick={() => setProVotesSafe(currentRound, p.proVotes - 5)} className="px-1 py-0.5 text-[10px] font-bold bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors shadow-sm">+5</button>
                                                </div>
                                                <div className="text-5xl font-black font-mono text-red-700 tracking-tighter">{totalVoters - p.proVotes}</div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="relative h-16 flex items-center">
                                        {/* 进度条背景 */}
                                        <div className="relative w-full h-5 bg-slate-200 rounded-full overflow-hidden flex shadow-inner border border-slate-300/50">
                                            <div className="h-full bg-gradient-to-r from-blue-600 to-blue-500 transition-all duration-200" style={{ width: `${proPercent}%` }} />
                                            <div className="h-full bg-gradient-to-r from-red-500 to-red-600 transition-all duration-200" style={{ width: `${100 - proPercent}%` }} />
                                        </div>
                                        
                                        {/* 优化后的滑块形状：胶囊造型 */}
                                        <div 
                                            className="vote-handle absolute z-20 w-10 h-10 bg-white border-[3px] border-slate-900 rounded-2xl shadow-[0_8px_20px_rgba(0,0,0,0.15)] flex items-center justify-center"
                                            style={{ left: `${proPercent}%`, transform: 'translateX(-50%)' }}
                                        >
                                            <div className="w-1 h-5 bg-slate-900 rounded-full opacity-20 mx-0.5" />
                                            <div className="w-1 h-5 bg-slate-900 rounded-full opacity-80 mx-0.5" />
                                            <div className="w-1 h-5 bg-slate-900 rounded-full opacity-20 mx-0.5" />
                                        </div>

                                        {/* 隐藏的交互层 */}
                                        <input 
                                            type="range" 
                                            min="0" 
                                            max={totalVoters} 
                                            value={p.proVotes} 
                                            onChange={e => setProVotesSafe(currentRound, parseInt(e.target.value))} 
                                            className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30" 
                                        />
                                    </div>
                                    <div className="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest px-2 -mt-2">
                                        <span>{proName} 阵营</span>
                                        <span>{conName} 阵营</span>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-50 p-4 border-t border-slate-100 flex justify-between px-8">
                                <button onClick={() => currentRound > 0 ? setCurrentRound(currentRound - 1) : setView('setup')} className="text-sm font-bold text-slate-400 hover:text-slate-700 flex items-center gap-1"><Icon name="ChevronLeft" /> 返回</button>
                                <button onClick={() => currentRound < 3 ? setCurrentRound(currentRound + 1) : setView('summary')} className="px-8 py-2 bg-slate-900 text-white rounded-xl font-bold flex items-center gap-1 hover:bg-slate-800 transition-all">{currentRound === 3 ? '查看最终结果' : '下一场'} <Icon name="ChevronRight" /></button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderSummary = () => (
                <div className="max-w-3xl mx-auto space-y-6 fade-in">
                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="bg-indigo-600 p-10 text-center text-white">
                            <Icon name="Trophy" className="w-12 h-12 mx-auto text-yellow-300 mb-4" />
                            <h2 className="text-2xl font-bold mb-1">辩论赛最终统计</h2>
                            <p className="text-indigo-100 text-sm font-medium">“ {topic} ”</p>
                        </div>

                        <div className="p-8 space-y-8">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-blue-50/50 rounded-2xl p-6 text-center border border-blue-100">
                                    <span className="text-[10px] font-bold text-blue-600 uppercase block mb-3">{proName}</span>
                                    <div className="flex justify-around">
                                        <div><p className="text-[10px] text-slate-400 uppercase">场次</p><p className="text-2xl font-bold text-blue-700">{results.proRounds}</p></div>
                                        <div className="w-px h-8 bg-blue-100" />
                                        <div><p className="text-[10px] text-slate-400 uppercase">总票</p><p className="text-2xl font-bold text-blue-700">{results.proTotalVotes}</p></div>
                                    </div>
                                </div>
                                <div className="bg-red-50/50 rounded-2xl p-6 text-center border border-red-100">
                                    <span className="text-[10px] font-bold text-red-600 uppercase block mb-3">{conName}</span>
                                    <div className="flex justify-around">
                                        <div><p className="text-[10px] text-slate-400 uppercase">场次</p><p className="text-2xl font-bold text-red-700">{results.conRounds}</p></div>
                                        <div className="w-px h-8 bg-red-100" />
                                        <div><p className="text-[10px] text-slate-400 uppercase">总票</p><p className="text-2xl font-bold text-red-700">{results.conTotalVotes}</p></div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-900 rounded-2xl p-8 text-center text-white">
                                <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">最终胜出</span>
                                <div className="text-4xl font-bold">{results.winner === 'pro' ? proName : results.winner === 'con' ? conName : '双方持平'}</div>
                            </div>

                            {results.winner === 'tie' && (
                                <div className="bg-amber-50 border border-amber-100 rounded-2xl p-6 space-y-4 fade-in">
                                    <div className="text-center">
                                        <span className="text-[10px] font-bold text-amber-600 uppercase tracking-widest block mb-1">终极投票 (平局决胜)</span>
                                        <p className="text-xs text-amber-700">请观众进行最后一轮整体投票</p>
                                    </div>
                                    <div className="flex justify-between items-end px-4">
                                        <div className="text-center">
                                            <p className="text-[10px] font-bold text-blue-600 uppercase">{proName}</p>
                                            <p className="text-3xl font-black text-blue-700">{finalVote}</p>
                                        </div>
                                        <div className="flex-1 px-8 pb-2">
                                            <div className="relative h-2 bg-slate-200 rounded-full overflow-hidden flex">
                                                <div className="h-full bg-blue-500" style={{ width: `${(finalVote/totalVoters)*100}%` }} />
                                                <div className="h-full bg-red-500" style={{ width: `${100 - (finalVote/totalVoters)*100}%` }} />
                                                <input type="range" min="0" max={totalVoters} value={finalVote} onChange={e => setFinalVote(parseInt(e.target.value))} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                            </div>
                                        </div>
                                        <div className="text-center">
                                            <p className="text-[10px] font-bold text-red-600 uppercase">{conName}</p>
                                            <p className="text-3xl font-black text-red-700">{totalVoters - finalVote}</p>
                                        </div>
                                    </div>
                                    <div className="text-center pt-2">
                                        <div className={`inline-block px-6 py-2 rounded-xl font-bold text-white ${finalVote > (totalVoters-finalVote) ? 'bg-blue-600' : (finalVote < (totalVoters-finalVote) ? 'bg-red-600' : 'bg-slate-400')}`}>
                                            最终胜者：{finalVote > (totalVoters-finalVote) ? proName : (finalVote < (totalVoters-finalVote) ? conName : '仍为平局')}
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="flex justify-center gap-3">
                                <button onClick={() => setView('setup')} className="px-6 py-2 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition-all">修改设置</button>
                                <button onClick={() => { 
                                    saveToHistory();
                                    setView('setup'); 
                                    setTopic(''); 
                                    setPoints(points.map(p=>({...p, text:'', proVotes: Math.floor(totalVoters/2)}))); 
                                }} className="px-6 py-2 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all">保存并结束比赛</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-3 sticky top-0 z-40">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-indigo-600 p-1.5 rounded-lg text-white"><Icon name="MessageSquare" className="w-4 h-4" /></div>
                                <span className="font-extrabold text-slate-800 tracking-tight">辩论赛计票系统</span>
                            </div>
                            <div className="flex gap-1">
                                <button onClick={() => setShowHistory(true)} className="p-2 text-slate-400 hover:text-indigo-600 transition-all"><Icon name="History" /></button>
                                <button onClick={exportExcel} className="p-2 text-slate-400 hover:text-green-600 transition-all"><Icon name="Download" /></button>
                                <button onClick={() => fileInputRef.current.click()} className="p-2 text-slate-400 hover:text-amber-600 transition-all"><Icon name="Upload" /></button>
                                <input type="file" ref={fileInputRef} onChange={handleImport} accept=".xlsx, .xls" className="hidden" />
                            </div>
                        </div>
                    </nav>

                    <main className="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6">
                        {view === 'setup' && renderSetup()}
                        {view === 'debate' && renderDebate()}
                        {view === 'summary' && renderSummary()}
                    </main>

                    {showHistory && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div onClick={() => setShowHistory(false)} className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" />
                            <div className="relative w-full max-w-lg bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[70vh] fade-in">
                                <div className="p-5 border-b flex justify-between items-center">
                                    <h2 className="font-bold">历史记录</h2>
                                    <button onClick={() => setShowHistory(false)} className="p-2 hover:bg-slate-100 rounded-full"><Icon name="X" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                    {sessions.length === 0 ? <p className="text-center text-slate-400 py-10">暂无记录</p> : sessions.map(s => (
                                        <div key={s.id} className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex justify-between items-center group">
                                            <div className="cursor-pointer flex-1" onClick={() => loadSession(s)}>
                                                <h4 className="font-bold text-slate-800">{s.topic}</h4>
                                                <p className="text-[10px] text-slate-400 uppercase">{new Date(s.timestamp).toLocaleString()}</p>
                                            </div>
                                            <button onClick={() => setSessions(sessions.filter(x => x.id !== s.id))} className="p-2 text-red-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="Trash2" /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
