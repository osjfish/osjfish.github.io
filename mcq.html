<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择题库</title>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <style>
        :root {
            --paper: #FDF6E3;
            --ink: #2C3E50;
            --red: #A93226;
        }

        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Noto Serif SC', serif;
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
            font-size: 14px;
        }

        .title-font {
            font-family: 'ZCOOL XiaoWei', serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(169, 50, 38, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(169, 50, 38, 0.2);
            border-radius: 2px;
        }

        .icon-svg {
            width: 1.1em;
            height: 1.1em;
            display: inline-block;
            vertical-align: middle;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .modal-overlay {
            background-color: rgba(44, 62, 80, 0.6);
            backdrop-filter: blur(2px);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Noto Serif SC', 'serif'],
                        title: ['ZCOOL XiaoWei', 'serif'],
                    },
                    colors: {
                        themeRed: '#A93226',
                        themePaper: '#FDF6E3',
                        themeInk: '#2C3E50',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- Icons ---
        const Icons = {
            Plus: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Upload: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Download: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Search: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Edit: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Trash: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Clock: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Check: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>,
            X: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Alert: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            History: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
            Eraser: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="m22 21H7"/><path d="m5 11 9 9"/></svg>,
            Star: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            FileText: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
        };

        // --- Constants ---
        const THEME_CLASSES = {
            card: "bg-[#FDF6E3] border border-[#A93226]/20 shadow-[2px_2px_0px_rgba(169,50,38,0.05)] rounded-sm p-4 relative overflow-hidden",
            button: "px-4 py-1.5 bg-[#A93226] text-white font-serif hover:bg-[#8C2727] transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-[1px_1px_0px_rgba(0,0,0,0.2)] active:translate-y-[1px] active:shadow-none text-sm",
            secondaryButton: "px-4 py-1.5 border border-[#A93226] text-[#A93226] font-serif hover:bg-[#A93226]/5 transition-all text-sm",
            input: "w-full bg-transparent border-b border-[#A93226]/30 focus:border-[#A93226] outline-none h-9 px-1 font-serif transition-all text-sm appearance-none",
            title: "font-title text-2xl text-[#A93226] border-b-2 border-[#A93226] inline-block mb-4 pb-1",
            badge: "px-1.5 py-0.5 text-[10px] font-serif border border-[#A93226]/40 text-[#A93226] rounded-sm",
        };

        // --- Utils ---
        const getDifficulty = (q) => {
            if (q.practiceCount === 0) return '未练习';
            const rate = q.correctCount / q.practiceCount;
            if (rate >= 0.9) return '易';
            if (rate >= 0.7) return '中';
            return '难';
        };

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const formatTime = (ms) => {
            const totalSeconds = Math.floor(ms / 1000);
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            if (m > 0) return `${m}分${s}秒`;
            return `${s}秒`;
        };

        // --- Components ---

        const Modal = ({ isOpen, onClose, title, children, footer }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay">
                    <div className="bg-[#FDF6E3] border-2 border-[#A93226] shadow-2xl max-w-md w-full p-6 space-y-4">
                        <div className="flex justify-between items-center border-b border-[#A93226]/20 pb-2">
                            <h3 className="font-title text-xl text-themeRed">{title}</h3>
                            <button onClick={onClose} className="text-themeRed opacity-50 hover:opacity-100"><Icons.X/></button>
                        </div>
                        <div className="font-serif text-sm leading-relaxed">{children}</div>
                        <div className="flex justify-end gap-3 pt-2">{footer}</div>
                    </div>
                </div>
            );
        };

        const Home = ({ questions, filteredQuestions, searchQuery, setSearchQuery, filterTags, setFilterTags, filterDifficulty, setFilterDifficulty, filterFavorites, setFilterFavorites, allTags, setMode, setEditingQuestion, onImportClick, handleExportExcel, setQuestions, selectedIds, setSelectedIds, confirmDelete, confirmClear, setInfoModal, setFavorites, favorites }) => {
            const isAllSelected = filteredQuestions.length > 0 && selectedIds.length === filteredQuestions.length;
            
            return (
                <div className="space-y-4">
                    <div className={THEME_CLASSES.card}>
                        <div className="flex flex-wrap gap-3 mb-4">
                            <button onClick={() => {setEditingQuestion(null); setMode('edit')}} className={THEME_CLASSES.button}><Icons.Plus/> 新增题目</button>
                            <button onClick={onImportClick} className={THEME_CLASSES.secondaryButton}><Icons.Upload/> 导入题库</button>
                            <button onClick={() => setMode('text_import')} className={THEME_CLASSES.secondaryButton}><Icons.FileText/> 文本导入</button>
                            <button onClick={handleExportExcel} className={THEME_CLASSES.secondaryButton}><Icons.Download/> 导出题库</button>
                            {questions.length > 0 && <button onClick={confirmClear} className="px-4 py-1.5 border border-red-700 text-red-700 font-serif hover:bg-red-50 transition-all text-sm flex items-center gap-2"><Icons.Eraser/> 清空题库</button>}
                            <div className="flex-1"></div>
                            {selectedIds.length > 0 && (
                                <button onClick={() => confirmDelete(selectedIds)} className="px-4 py-1.5 bg-red-700 text-white font-serif text-sm flex items-center gap-2">
                                    <Icons.Trash/> 删除选中 ({selectedIds.length})
                                </button>
                            )}
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-5 gap-3">
                            <div className="relative md:col-span-2">
                                <Icons.Search className="absolute left-2 top-1/2 -translate-y-1/2 opacity-30 w-4 h-4"/>
                                <input className={THEME_CLASSES.input + " pl-8"} placeholder="搜索题目、备注关键词..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}/>
                            </div>
                            <div className="relative">
                                <select className={THEME_CLASSES.input + " pr-8"} value={filterTags[0] || ""} onChange={e => setFilterTags(e.target.value ? [e.target.value] : [])}>
                                    <option value="">所有标签</option>
                                    {allTags.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            </div>
                            <div className="relative">
                                <select className={THEME_CLASSES.input + " pr-8"} value={filterDifficulty[0] || ""} onChange={e => setFilterDifficulty(e.target.value ? [e.target.value] : [])}>
                                    <option value="">所有难度</option>
                                    <option value="未练习">未练习</option><option value="易">易</option><option value="中">中</option><option value="难">难</option>
                                </select>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setFilterFavorites(!filterFavorites)} className={`flex-1 px-2 py-1 text-xs border ${filterFavorites ? 'bg-yellow-500 text-white border-yellow-500' : 'border-themeRed/20'}`}>收藏</button>
                            </div>
                        </div>
                        <div className="mt-3 flex justify-between items-center px-1">
                            <p className="text-[10px] opacity-40">当前筛选条件下共有 <span className="text-themeRed font-bold">{filteredQuestions.length}</span> 道题目</p>
                            {filteredQuestions.length !== questions.length && (
                                <button onClick={() => {setSearchQuery(''); setFilterTags([]); setFilterDifficulty([]); setFilterFavorites(false);}} className="text-[10px] text-themeRed hover:underline">重置筛选</button>
                            )}
                        </div>
                    </div>

                    <div className="space-y-2">
                        {questions.length === 0 ? (
                            <div className="text-center py-20 opacity-50">
                                <div className="text-6xl mb-4">&#128221;</div>
                                <p className="text-lg mb-2">题库还是空的</p>
                                <p className="text-sm mb-6">点击上方"新增题目"或"导入题库"开始添加题目吧</p>
                                <div className="flex justify-center gap-3 text-xs">
                                    <span className="px-3 py-1 border rounded-sm">支持 Excel 批量导入</span>
                                    <span className="px-3 py-1 border rounded-sm">支持文本粘贴导入</span>
                                    <span className="px-3 py-1 border rounded-sm">支持手动逐题添加</span>
                                </div>
                            </div>
                        ) : filteredQuestions.length === 0 ? (
                            <div className="text-center py-16 opacity-40">
                                <p className="text-lg mb-2">没有匹配的题目</p>
                                <p className="text-sm">尝试调整筛选条件</p>
                            </div>
                        ) : (
                            <div className="flex items-center gap-3 px-4 py-2 border-b border-themeRed/10 text-xs opacity-50">
                                <input type="checkbox" checked={isAllSelected} onChange={(e) => {
                                    if (e.target.checked) setSelectedIds(filteredQuestions.map(q => q.id));
                                    else setSelectedIds([]);
                                }}/>
                                <span>全选 ({filteredQuestions.length})</span>
                            </div>
                        )}
                        {filteredQuestions.length > 0 && filteredQuestions.map(q => (
                            <div key={q.id} className={THEME_CLASSES.card + " group py-3"}>
                                <div className="flex justify-between items-start gap-4">
                                    <div className="pt-1">
                                        <input type="checkbox" checked={selectedIds.includes(q.id)} onChange={(e) => {
                                            if (e.target.checked) setSelectedIds([...selectedIds, q.id]);
                                            else setSelectedIds(selectedIds.filter(id => id !== q.id));
                                        }}/>
                                    </div>
                                    <div className="space-y-1 flex-1">
                                        <div className="flex gap-2 items-center">
                                            <span className={THEME_CLASSES.badge}>{q.answer.length > 1 ? '多选' : '单选'}</span>
                                            <span className={THEME_CLASSES.badge}>{getDifficulty(q)}</span>
                                            {q.tags.map(t => <span key={t} className="text-[10px] opacity-40">#{t}</span>)}
                                        </div>
                                        <p className="text-sm leading-relaxed">{q.stem}</p>
                                        {q.remark && <p className="text-[11px] text-themeRed/60 italic">备注: {q.remark}</p>}
                                        <div className="text-[10px] opacity-30 flex gap-4">
                                            <span>练习: {q.practiceCount}</span>
                                            <span>正确: {q.correctCount}</span>
                                            <span>正确率: {q.practiceCount ? (q.correctCount / q.practiceCount * 100).toFixed(1) : 0}%</span>
                                        </div>
                                    </div>
                                    <div className="flex gap-1 items-center opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onClick={() => setFavorites(prev => prev.includes(q.id) ? prev.filter(id => id !== q.id) : [...prev, q.id])} 
                                            className={`p-1 ${favorites.includes(q.id) ? 'text-yellow-500' : 'text-themeRed/40'} hover:bg-themeRed/5`}>
                                            <Icons.Star className="w-4 h-4" style={favorites.includes(q.id) ? { fill: 'currentColor', stroke: 'none' } : {}}/>
                                        </button>
                                        <button onClick={() => { setEditingQuestion(q); setMode('edit'); }} className="p-1 text-themeRed hover:bg-themeRed/5"><Icons.Edit className="w-4 h-4"/></button>
                                        <button onClick={() => confirmDelete([q.id])} className="p-1 text-red-700 hover:bg-red-50"><Icons.Trash className="w-4 h-4"/></button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const Edit = ({ editingQuestion, saveQuestion, setMode }) => {
            const [form, setForm] = useState(editingQuestion || { 
                stem: '', options: ['', '', '', ''], answer: '', analysis: '', tags: [], 
                practiceCount: 0, correctCount: 0, remark: ''
            });
            const [tagInput, setTagInput] = useState(form.tags.join(','));

            const handleSave = (e) => {
                if (e) e.preventDefault();
                const finalTags = tagInput.split(/[\s,，]+/).filter(Boolean);
                saveQuestion({ ...form, tags: finalTags });
            };

            const addOption = () => {
                if (form.options.length < 10) {
                    setForm({ ...form, options: [...form.options, ''] });
                }
            };

            const removeOption = (index) => {
                if (form.options.length > 2) {
                    const newOptions = form.options.filter((_, i) => i !== index);
                    setForm({ ...form, options: newOptions });
                }
            };

            return (
                <div className="max-w-3xl mx-auto space-y-4 pb-10">
                    <div className="flex justify-between items-center">
                        <h2 className={THEME_CLASSES.title}>{editingQuestion ? '修改' : '新增'}题目</h2>
                        <div className="flex gap-3">
                            <button onClick={handleSave} className={THEME_CLASSES.button}>保存题目</button>
                            <button onClick={() => setMode('home')} className={THEME_CLASSES.secondaryButton}>返回</button>
                        </div>
                    </div>

                    <div className={THEME_CLASSES.card + " space-y-6"}>
                        <div>
                            <label className="text-xs font-bold text-themeRed mb-2 block">题干内容</label>
                            <textarea className={THEME_CLASSES.input + " h-24 resize-none text-base leading-relaxed p-2 bg-white/30"} 
                                placeholder="请输入题目内容..."
                                value={form.stem} onChange={e => setForm({...form, stem: e.target.value})}/>
                        </div>

                        <div>
                            <div className="flex justify-between items-center mb-2">
                                <label className="text-xs font-bold text-themeRed block">选项设置</label>
                                <button onClick={addOption} className="text-[10px] bg-themeRed/10 text-themeRed px-2 py-1 rounded hover:bg-themeRed/20 transition-colors">+ 添加选项</button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3">
                                {form.options.map((opt, i) => (
                                    <div key={i} className="flex gap-2 items-center group">
                                        <span className="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-themeRed/10 text-themeRed font-bold rounded-full text-sm">{String.fromCharCode(65+i)}</span>
                                        <input className={THEME_CLASSES.input + " bg-white/20"} 
                                            placeholder={`选项 ${String.fromCharCode(65+i)}`}
                                            value={opt} onChange={e => {
                                                const n = [...form.options]; n[i] = e.target.value; setForm({...form, options: n});
                                            }}/>
                                        {form.options.length > 2 && (
                                            <button onClick={() => removeOption(i)} className="opacity-0 group-hover:opacity-100 p-1 text-themeRed/40 hover:text-themeRed transition-all">
                                                <Icons.X size={14}/>
                                            </button>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div>
                            <label className="text-xs font-bold text-themeRed mb-2 block">正确答案 (勾选即可)</label>
                            <div className="flex flex-wrap gap-2">
                                {form.options.map((_, i) => {
                                    const letter = String.fromCharCode(65 + i);
                                    const isSelected = form.answer.includes(letter);
                                    return (
                                        <button key={i} type="button"
                                            onClick={() => {
                                                const newAnswer = isSelected 
                                                    ? form.answer.replace(letter, '') 
                                                    : (form.answer + letter).split('').sort().join('');
                                                setForm({...form, answer: newAnswer});
                                            }}
                                            className={`w-8 h-8 rounded border flex items-center justify-center font-bold ${isSelected ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/20'}`}>
                                            {letter}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        <div>
                            <label className="text-xs font-bold text-themeRed mb-2 block">解析说明</label>
                            <input className={THEME_CLASSES.input} 
                                placeholder="请输入题目解析..."
                                value={form.analysis} onChange={e => setForm({...form, analysis: e.target.value})}/>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label className="text-xs font-bold text-themeRed mb-2 block">标签 (逗号或空格分隔)</label>
                                <input className={THEME_CLASSES.input} 
                                    placeholder="例如: 历史,必修一,重要"
                                    value={tagInput} onChange={e => setTagInput(e.target.value)}/>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-themeRed mb-2 block">备注信息 (搜索关键词)</label>
                                <input className={THEME_CLASSES.input} 
                                    placeholder="添加备注，方便后续搜索..."
                                    value={form.remark} onChange={e => setForm({...form, remark: e.target.value})}/>
                            </div>
                        </div>

                        <div className="pt-4 border-t border-themeRed/10 grid grid-cols-2 gap-6">
                            <div>
                                <label className="text-xs opacity-50 block mb-1">累计练习次数</label>
                                <input type="number" min="0" className={THEME_CLASSES.input + " text-center bg-white/10"} 
                                    value={form.practiceCount} 
                                    onChange={e => {
                                        const val = Math.max(0, parseInt(e.target.value) || 0);
                                        setForm(prev => ({...prev, practiceCount: Math.max(val, prev.correctCount)}));
                                    }}/>
                            </div>
                            <div>
                                <label className="text-xs opacity-50 block mb-1">累计正确次数</label>
                                <input type="number" min="0" className={THEME_CLASSES.input + " text-center bg-white/10"} 
                                    value={form.correctCount} 
                                    onChange={e => {
                                        const val = Math.max(0, parseInt(e.target.value) || 0);
                                        setForm(prev => ({
                                            ...prev, 
                                            correctCount: val,
                                            practiceCount: Math.max(prev.practiceCount, val)
                                        }));
                                    }}/>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PracticeConfig = ({ allTags, startPractice, lastIndex, setMode, questions, setLastPracticeIndex }) => {
            const [config, setConfig] = useState({
                type: 'sequential', 
                tags: [],
                difficulties: [],
                shuffleOptions: true
            });
            const [showConfirm, setShowConfirm] = useState(false);

            const filteredCount = useMemo(() => {
                return questions.filter(q => {
                    const matchesTags = config.tags.length === 0 || config.tags.some(t => q.tags.includes(t));
                    const matchesDifficulty = config.difficulties.length === 0 || config.difficulties.includes(getDifficulty(q));
                    return matchesTags && matchesDifficulty;
                }).length;
            }, [questions, config]);

            const handleClearProgress = () => {
                localStorage.setItem('choice_bank_last_index', '0');
                setLastPracticeIndex(0);
                setShowConfirm(false);
            };

            return (
                <div className="max-w-md mx-auto space-y-4">
                    <h2 className={THEME_CLASSES.title}>练习准备</h2>
                    <div className={THEME_CLASSES.card + " space-y-6"}>
                        <div className="space-y-2">
                            <label className="text-xs opacity-50 block">练习方式</label>
                            <div className="flex gap-3">
                                <button onClick={() => setConfig({...config, type: 'sequential'})} className={`flex-1 py-2 border ${config.type === 'sequential' ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/10'}`}>顺序练习</button>
                                <button onClick={() => setConfig({...config, type: 'random'})} className={`flex-1 py-2 border ${config.type === 'random' ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/10'}`}>乱序练习</button>
                            </div>
                            {config.type === 'sequential' && lastIndex > 0 && (
                                <div className="flex justify-between items-center">
                                    <p className="text-[10px] text-themeRed/60 flex items-center gap-1"><Icons.History/> 上次练习至第 {lastIndex + 1} 题</p>
                                    <button onClick={() => setShowConfirm(true)} className="text-[10px] text-red-700 hover:underline">清空进度</button>
                                </div>
                            )}
                        </div>

                        <Modal 
                            isOpen={showConfirm} 
                            onClose={() => setShowConfirm(false)} 
                            title="确认清空" 
                            footer={
                                <>
                                    <button onClick={() => setShowConfirm(false)} className={THEME_CLASSES.secondaryButton}>取消</button>
                                    <button onClick={handleClearProgress} className="px-4 py-1.5 bg-red-700 text-white font-serif text-sm">确认清空</button>
                                </>
                            }
                        >
                            确定要清空当前的练习进度吗？清空后将从第一题重新开始。
                        </Modal>

                        <div className="space-y-4">
                            <div>
                                <label className="text-xs opacity-50 block mb-2">筛选标签</label>
                                <div className="flex flex-wrap gap-2">
                                    {allTags.map(t => (
                                        <button key={t} onClick={() => setConfig({...config, tags: config.tags.includes(t) ? config.tags.filter(i => i !== t) : [...config.tags, t]})}
                                            className={`px-2 py-0.5 text-xs border ${config.tags.includes(t) ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/20'}`}>{t}</button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="text-xs opacity-50 block mb-2">筛选难度</label>
                                <div className="flex gap-2">
                                    {['未练习', '易', '中', '难'].map(d => (
                                        <button key={d} onClick={() => setConfig({...config, difficulties: config.difficulties.includes(d) ? config.difficulties.filter(i => i !== d) : [...config.difficulties, d]})}
                                            className={`px-3 py-1 text-xs border ${config.difficulties.includes(d) ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/20'}`}>{d}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="flex gap-4">
                                <label className="flex items-center gap-2 text-xs cursor-pointer">
                                    <input type="checkbox" checked={config.shuffleOptions} onChange={e => setConfig({...config, shuffleOptions: e.target.checked})}/> 打乱选项顺序
                                </label>
                            </div>
                            <p className="text-[10px] opacity-40">当前筛选条件下共有 <span className="text-themeRed font-bold">{filteredCount}</span> 道题目</p>
                        </div>

                        <div className="flex gap-3 pt-4">
                            <button onClick={() => startPractice(config)} className={THEME_CLASSES.button + " flex-1 py-3"}>开始练习</button>
                            {config.type === 'sequential' && lastIndex >= 0 && questions.length > 0 && (
                                <button onClick={() => startPractice({...config, continue: true})} className={THEME_CLASSES.secondaryButton + " flex-1 py-3"}>延续进度</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const Practice = ({ practiceState, setPracticeState, setMode, updateStats, setLastPracticeIndex }) => {
            const [showCompleteModal, setShowCompleteModal] = useState(false);
            const [correctCount, setCorrectCount] = useState(0);
            const [wrongCount, setWrongCount] = useState(0);
            const [startTime] = useState(Date.now());
            const [results, setResults] = useState([]);
            if (!practiceState) return null;
            const current = practiceState.list[practiceState.index];
            
            const displayOptions = useMemo(() => {
                const opts = current.options.map((text, idx) => ({ text, originalLetter: String.fromCharCode(65 + idx) }));
                return practiceState.shuffleOptions ? shuffleArray(opts) : opts;
            }, [current.id, practiceState.shuffleOptions]);

            const displayOptionsRef = useRef(displayOptions);
            displayOptionsRef.current = displayOptions;
            const currentRef = useRef(current);
            currentRef.current = current;
            const practiceStateRef = useRef(practiceState);
            practiceStateRef.current = practiceState;

            const handleSubmit = useCallback(() => {
                const ps = practiceStateRef.current;
                const cur = currentRef.current;
                if (!cur) return;
                const isCorrect = ps.userAnswer.split('').sort().join('') === cur.answer.split('').sort().join('');
                updateStats(cur.id, isCorrect);
                setResults(prev => [...prev, { question: cur, isCorrect, userAnswer: ps.userAnswer }]);
                if (isCorrect) setCorrectCount(prev => prev + 1);
                else setWrongCount(prev => prev + 1);
                setPracticeState({...ps, showAnswer: true});
                if (ps.type === 'sequential') {
                    localStorage.setItem('choice_bank_last_index', ps.index.toString());
                    setLastPracticeIndex(ps.index);
                }
            }, [updateStats, setLastPracticeIndex, setPracticeState]);

            const handleSubmitRef = useRef(handleSubmit);
            handleSubmitRef.current = handleSubmit;

            useEffect(() => {
                const handleKeyDown = (e) => {
                    const ps = practiceStateRef.current;
                    const cur = currentRef.current;
                    const opts = displayOptionsRef.current;
                    if (ps.showAnswer) {
                        if (e.key === 'Enter') {
                            if (ps.index < ps.list.length - 1) setPracticeState({...ps, index: ps.index+1, showAnswer: false, userAnswer: ''});
                            else { setShowCompleteModal(true); }
                        }
                    } else {
                        if (e.key >= '1' && e.key <= '9') {
                            const idx = parseInt(e.key) - 1;
                            if (idx < opts.length) {
                                const opt = opts[idx];
                                const isMultiple = cur.answer.length > 1;
                                if (!isMultiple) {
                                    setPracticeState(prev => ({...prev, userAnswer: opt.originalLetter}));
                                } else {
                                    setPracticeState(prev => {
                                        const currentUA = prev.userAnswer;
                                        const newUA = currentUA.includes(opt.originalLetter) 
                                            ? currentUA.replace(opt.originalLetter, '') 
                                            : currentUA + opt.originalLetter;
                                        return {...prev, userAnswer: newUA};
                                    });
                                }
                            }
                        } else if (e.key === 'Enter' && practiceStateRef.current.userAnswer) {
                            handleSubmitRef.current();
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            return (
                <div className="max-w-2xl mx-auto space-y-4">
                    <Modal 
                        isOpen={showCompleteModal} 
                        onClose={() => { setShowCompleteModal(false); setMode('home'); }} 
                        title={practiceState.index >= practiceState.list.length - 1 ? "练习完成" : "练习统计"} 
                        footer={<button onClick={() => { setShowCompleteModal(false); setMode('home'); }} className={THEME_CLASSES.button}>返回主页</button>}
                    >
                        <div className="space-y-4">
                            <div className="text-center space-y-2">
                                <p className="text-lg font-bold text-themeRed">{practiceState.index >= practiceState.list.length - 1 ? '恭喜你完成了本次练习！' : '本次练习统计'}</p>
                                <div className="grid grid-cols-3 gap-4 text-sm">
                                    <div className="p-3 border border-themeRed/10 rounded-sm">
                                        <p className="text-xs opacity-50 mb-1">已做</p>
                                        <p className="text-2xl font-bold text-themeRed">{correctCount + wrongCount} / {practiceState.list.length}</p>
                                    </div>
                                    <div className="p-3 border border-green-700/10 rounded-sm">
                                        <p className="text-xs opacity-50 mb-1">答对</p>
                                        <p className="text-2xl font-bold text-green-700">{correctCount}</p>
                                    </div>
                                    <div className="p-3 border border-red-700/10 rounded-sm">
                                        <p className="text-xs opacity-50 mb-1">答错</p>
                                        <p className="text-2xl font-bold text-red-700">{wrongCount}</p>
                                    </div>
                                </div>
                                <div className="flex items-center justify-center gap-6 text-sm pt-2">
                                    <p>正确率：<span className="font-bold text-themeRed">{correctCount + wrongCount > 0 ? (correctCount / (correctCount + wrongCount) * 100).toFixed(1) : 0}%</span></p>
                                    <p>用时：<span className="font-bold text-themeRed">{formatTime(Date.now() - startTime)}</span></p>
                                </div>
                            </div>
                            <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                                {results.map((r, i) => (
                                    <div key={i} className={`p-2 text-xs border rounded-sm flex justify-between items-center ${r.isCorrect ? 'border-green-700/20 bg-green-50' : 'border-red-700/20 bg-red-50'}`}>
                                        <span className="truncate flex-1 mr-2">{i + 1}. {r.question.stem}</span>
                                        <span className={`flex-shrink-0 ${r.isCorrect ? 'text-green-700' : 'text-red-700'}`}>{r.isCorrect ? '正确' : '错误'}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </Modal>
                    <div className="flex justify-between items-center">
                        <h2 className={THEME_CLASSES.title}>练习模式</h2>
                        <span className="text-xs opacity-50">{practiceState.index + 1} / {practiceState.list.length}</span>
                    </div>
                    <div className="w-full h-1.5 bg-themeRed/10 rounded-sm overflow-hidden">
                        <div className="h-full bg-themeRed transition-all duration-300" style={{ width: `${((practiceState.index + 1) / practiceState.list.length) * 100}%` }}></div>
                    </div>
                    <div className={THEME_CLASSES.card + " space-y-6"}>
                        <div className="flex gap-2"><span className={THEME_CLASSES.badge}>{current.answer.length > 1 ? '多选' : '单选'}</span></div>
                        <p className="text-lg leading-relaxed">{current.stem}</p>
                        <div className="text-[10px] opacity-30 text-right">快捷键：数字键选择 | Enter 提交/下一题</div>
                        <div className="space-y-2">
                            {displayOptions.map((opt, i) => {
                                const letter = String.fromCharCode(65 + i);
                                const isSelected = practiceState.userAnswer.includes(opt.originalLetter);
                                return (
                                    <button key={i} 
                                        disabled={practiceState.showAnswer}
                                        onClick={() => {
                                            const currentUA = practiceState.userAnswer;
                                            const newUA = currentUA.includes(opt.originalLetter) 
                                                ? currentUA.replace(opt.originalLetter, '') 
                                                : currentUA + opt.originalLetter;
                                            setPracticeState({...practiceState, userAnswer: newUA});
                                        }}
                                        className={`w-full text-left p-3 border transition-all flex items-center gap-3 ${isSelected ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/10 hover:border-themeRed/30'}`}>
                                        <span className={`w-6 h-6 flex items-center justify-center border rounded-full text-xs ${isSelected ? 'border-white' : 'border-themeRed/20'}`}>{letter}</span>
                                        {opt.text}
                                    </button>
                                );
                            })}
                        </div>
                        
                        {practiceState.showAnswer ? (
                            <div className="p-4 bg-themeRed/5 border-l-4 border-themeRed space-y-2 text-sm">
                                <p className="font-bold flex items-center gap-2">
                                    {practiceState.userAnswer.split('').sort().join('') === current.answer.split('').sort().join('') ? 
                                        <span className="text-green-700"><Icons.Check/> 正确</span> : 
                                        <span className="text-red-700"><Icons.X/> 错误</span>
                                    }
                                </p>
                                <p><span className="opacity-60">正确答案：</span>{current.answer.split('').map(l => {
                                    const optIndex = displayOptions.findIndex(o => o.originalLetter === l);
                                    return String.fromCharCode(65 + optIndex);
                                }).sort().join('')}</p>
                                <p><span className="opacity-60">解析：</span>{current.analysis || '无'}</p>
                                {current.remark && <p><span className="opacity-60">备注：</span>{current.remark}</p>}
                                <div className="flex gap-3 pt-2">
                                    <button onClick={() => {
                                        if (practiceState.index < practiceState.list.length - 1) setPracticeState({...practiceState, index: practiceState.index+1, showAnswer: false, userAnswer: ''});
                                        else { setShowCompleteModal(true); }
                                    }} className={THEME_CLASSES.button}>下一题</button>
                                    <button onClick={() => setShowCompleteModal(true)} className={THEME_CLASSES.secondaryButton} disabled={results.length === 0}>结束</button>
                                </div>
                            </div>
                        ) : (
                            <button onClick={handleSubmit} disabled={!practiceState.userAnswer} className={THEME_CLASSES.button + " w-full py-3"}>提交答案</button>
                        )}
                    </div>
                </div>
            );
        };

        const Exam = ({ examState, setExamState, handleExamFail, handleExamSuccess, updateStats }) => {
            if (!examState) return null;
            const current = examState.questions[examState.index];
            
            const displayOptions = useMemo(() => {
                const opts = current.options.map((text, idx) => ({ text, originalLetter: String.fromCharCode(65 + idx) }));
                return examState.shuffleOptions ? shuffleArray(opts) : opts;
            }, [current.id, examState.shuffleOptions]);

            const handleSubmit = () => {
                const isCorrect = examState.userAnswer.split('').sort().join('') === current.answer.split('').sort().join('');
                if (!isCorrect) return handleExamFail('答题错误', examState.index);
                
                updateStats(current.id, true);
                if (examState.index === examState.questions.length - 1) handleExamSuccess();
                else setExamState(prev => ({ ...prev, index: prev.index + 1, timeLeft: prev.timeLimit, userAnswer: '' }));
            };

            return (
                <div className="max-w-2xl mx-auto space-y-4">
                    <div className="flex justify-between items-center">
                        <h2 className={THEME_CLASSES.title}>实战检测</h2>
                        <div className="flex items-center gap-4">
                            <span className="text-xs opacity-50">{examState.index + 1} / {examState.questions.length}</span>
                            <div className={`text-xl font-title ${examState.timeLeft < 10 ? 'text-red-600 animate-pulse' : 'text-themeRed'}`}>
                                <Icons.Clock/> {examState.timeLeft}s
                            </div>
                        </div>
                    </div>
                    <div className="w-full h-1.5 bg-themeRed/10 rounded-sm overflow-hidden">
                        <div className="h-full bg-themeRed transition-all duration-300" style={{ width: `${((examState.index + 1) / examState.questions.length) * 100}%` }}></div>
                    </div>
                    <div className={THEME_CLASSES.card + " space-y-6"}>
                        <p className="text-lg leading-relaxed">{current.stem}</p>
                        <div className="space-y-2">
                            {displayOptions.map((opt, i) => {
                                const letter = String.fromCharCode(65 + i);
                                const isSelected = examState.userAnswer.includes(opt.originalLetter);
                                return (
                                    <button key={i} 
                                        onClick={() => {
                                            const currentUA = examState.userAnswer;
                                            const newUA = currentUA.includes(opt.originalLetter) 
                                                ? currentUA.replace(opt.originalLetter, '') 
                                                : currentUA + opt.originalLetter;
                                            setExamState({...examState, userAnswer: newUA});
                                        }}
                                        className={`w-full text-left p-3 border transition-all flex items-center gap-3 ${isSelected ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/10 hover:border-themeRed/30'}`}>
                                        <span className={`w-6 h-6 flex items-center justify-center border rounded-full text-xs ${isSelected ? 'border-white' : 'border-themeRed/20'}`}>{letter}</span>
                                        {opt.text}
                                    </button>
                                );
                            })}
                        </div>
                        <button onClick={handleSubmit} disabled={!examState.userAnswer} className={THEME_CLASSES.button + " w-full py-3"}>提交并继续</button>
                    </div>
                </div>
            );
        };

        const TextImport = ({ setMode, setQuestions, setInfoModal, questions }) => {
            const [text, setText] = useState('');
            const [preview, setPreview] = useState([]);

            const parseQuestions = (inputText) => {
                const result = [];
                const blocks = inputText.split(/\n\s*\n/).filter(b => b.trim());

                for (const block of blocks) {
                    const lines = block.trim().split('\n').filter(l => l.trim());
                    if (lines.length < 3) continue;

                    let stem = '';
                    const options = [];
                    let answer = '';
                    let analysis = '';
                    let tags = [];
                    let remark = '';

                    let i = 0;
                    stem = lines[i].replace(/^[\d\s\.、\)\]\}]+/, '').trim();
                    i++;

                    while (i < lines.length) {
                        const line = lines[i].trim();
                        const optMatch = line.match(/^([A-Za-z])[\.、:\s：](.*)/);
                        if (optMatch) {
                            options.push(optMatch[2].trim());
                            i++;
                        } else {
                            break;
                        }
                    }

                    if (options.length < 2) continue;

                    while (i < lines.length) {
                        const line = lines[i].trim();
                        if (/^答案[：:]?/.test(line)) {
                            answer = line.replace(/^答案[：:]?\s*/, '').toUpperCase().replace(/\s/g, '');
                            i++;
                        } else if (/^解析[：:]?/.test(line)) {
                            analysis = line.replace(/^解析[：:]?\s*/, '');
                            i++;
                        } else if (/^标签[：:]?/.test(line)) {
                            tags = line.replace(/^标签[：:]?\s*/, '').split(/[\s,，]+/).filter(Boolean);
                            i++;
                        } else if (/^备注[：:]?/.test(line)) {
                            remark = line.replace(/^备注[：:]?\s*/, '');
                            i++;
                        } else {
                            i++;
                        }
                    }

                    if (!answer || !stem) continue;

                    result.push({
                        id: Math.random().toString(36).substr(2, 9),
                        type: answer.length > 1 ? '多选题' : '单选题',
                        stem,
                        options,
                        answer,
                        analysis,
                        tags,
                        remark,
                        practiceCount: 0,
                        correctCount: 0,
                        createdAt: Date.now(),
                    });
                }

                return result;
            };

            const handlePreview = () => {
                const parsed = parseQuestions(text);
                setPreview(parsed);
            };

            const handleImport = () => {
                if (preview.length === 0) return;
                const existingKeys = new Set(questions.map(q => `${q.stem}|${q.options.join(',')}|${q.answer}`));
                const uniqueNew = preview.filter(q => !existingKeys.has(`${q.stem}|${q.options.join(',')}|${q.answer}`));
                setQuestions(prev => [...prev, ...uniqueNew]);
                setInfoModal({ isOpen: true, title: '提示', message: `文本导入完成：新增 ${uniqueNew.length} 道题目，跳过 ${preview.length - uniqueNew.length} 道重复题` });
                setMode('home');
            };

            return (
                <div className="max-w-3xl mx-auto space-y-4">
                    <div className="flex justify-between items-center">
                        <h2 className={THEME_CLASSES.title}>文本导入</h2>
                        <button onClick={() => setMode('home')} className={THEME_CLASSES.secondaryButton}>返回</button>
                    </div>
                    <div className={THEME_CLASSES.card + " space-y-4"}>
                        <div className="p-3 bg-themeRed/5 border border-themeRed/10 text-xs leading-relaxed">
                            <p className="font-bold mb-1">格式说明（题目之间用空行分隔）：</p>
                            <p className="opacity-60">题干内容（首行）</p>
                            <p className="opacity-60">A. 选项一</p>
                            <p className="opacity-60">B. 选项二</p>
                            <p className="opacity-60">C. 选项三</p>
                            <p className="opacity-60">D. 选项四</p>
                            <p className="opacity-60">答案：AB</p>
                            <p className="opacity-60">解析：（可选）</p>
                            <p className="opacity-60">标签：（可选，逗号或空格分隔）</p>
                            <p className="opacity-60">备注：（可选）</p>
                        </div>
                        <textarea
                            className="w-full h-64 bg-white/30 border border-themeRed/20 rounded-sm p-3 text-sm font-serif resize-y focus:border-themeRed outline-none"
                            placeholder="在此粘贴或输入题目..."
                            value={text}
                            onChange={e => setText(e.target.value)}
                        />
                        <div className="flex gap-3">
                            <button onClick={handlePreview} className={THEME_CLASSES.button}><Icons.Search/> 预览解析</button>
                        </div>
                        {preview.length > 0 && (
                            <div className="space-y-3 pt-2 border-t border-themeRed/10">
                                <p className="text-sm">解析到 <span className="text-themeRed font-bold">{preview.length}</span> 道题目</p>
                                <div className="max-h-40 overflow-y-auto custom-scrollbar space-y-1">
                                    {preview.map((q, i) => (
                                        <div key={i} className="flex gap-2 text-xs items-start p-2 bg-white/20 rounded-sm">
                                            <span className="text-themeRed font-bold flex-shrink-0">{i + 1}.</span>
                                            <span className="truncate">{q.stem}</span>
                                            <span className="text-themeRed/40 flex-shrink-0 ml-auto">答案: {q.answer}</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={handleImport} className={THEME_CLASSES.button + " w-full py-3"}>确认导入</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const BattleConfig = ({ allTags, setMode, questions, setInfoModal, startBattle }) => {
            const [config, setConfig] = useState({
                count: 10,
                timeLimit: 0,
                tags: [],
                difficulties: [],
                shuffleOptions: true,
            });

            const filteredCount = useMemo(() => {
                return questions.filter(q => {
                    const matchesTags = config.tags.length === 0 || config.tags.some(t => q.tags.includes(t));
                    const matchesDifficulty = config.difficulties.length === 0 || config.difficulties.includes(getDifficulty(q));
                    return matchesTags && matchesDifficulty;
                }).length;
            }, [questions, config]);

            return (
                <div className="max-w-md mx-auto space-y-4">
                    <h2 className={THEME_CLASSES.title}>对战准备</h2>
                    <div className={THEME_CLASSES.card + " space-y-4"}>
                        <div>
                            <label className="text-xs opacity-50 block mb-1">题目数量</label>
                            <input type="number" min="1" className={THEME_CLASSES.input} value={config.count} onChange={e => setConfig({...config, count: parseInt(e.target.value) || 10})}/>
                        </div>
                        <div>
                            <label className="text-xs opacity-50 block mb-1">每题限时 (秒，0为不限)</label>
                            <input type="number" min="0" className={THEME_CLASSES.input} value={config.timeLimit} onChange={e => setConfig({...config, timeLimit: parseInt(e.target.value) || 0})}/>
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs opacity-50 block mb-2">筛选标签</label>
                            <div className="flex flex-wrap gap-2">
                                {allTags.map(t => (
                                    <button key={t} onClick={() => setConfig({...config, tags: config.tags.includes(t) ? config.tags.filter(i => i !== t) : [...config.tags, t]})}
                                        className={`px-2 py-0.5 text-xs border ${config.tags.includes(t) ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/20'}`}>{t}</button>
                                ))}
                            </div>
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs opacity-50 block mb-2">筛选难度</label>
                            <div className="flex gap-2">
                                {['未练习', '易', '中', '难'].map(d => (
                                    <button key={d} onClick={() => setConfig({...config, difficulties: config.difficulties.includes(d) ? config.difficulties.filter(i => i !== d) : [...config.difficulties, d]})}
                                        className={`px-3 py-1 text-xs border ${config.difficulties.includes(d) ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/20'}`}>{d}</button>
                                ))}
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <label className="flex items-center gap-2 text-xs cursor-pointer">
                                <input type="checkbox" checked={config.shuffleOptions} onChange={e => setConfig({...config, shuffleOptions: e.target.checked})}/> 打乱选项顺序
                            </label>
                        </div>
                        <p className="text-[10px] opacity-40">当前筛选条件下共有 <span className="text-themeRed font-bold">{filteredCount}</span> 道题目</p>
                        <button onClick={() => {
                            if (filteredCount < config.count) return setInfoModal({ isOpen: true, title: '提示', message: `符合条件的题目不足 (当前 ${filteredCount} 题)` });
                            startBattle(config);
                        }} className={THEME_CLASSES.button + " w-full py-3"}>开始对战</button>
                        <button onClick={() => setMode('home')} className={THEME_CLASSES.secondaryButton + " w-full"}>返回</button>
                    </div>
                </div>
            );
        };

        const Battle = ({ battleState, setBattleState, setMode, updateStats, battleTimer, startBattle }) => {
            if (!battleState) return null;
            const { left, right, phase } = battleState;
            const leftQ = left.questions[left.index];
            const rightQ = right.questions[right.index];

            const leftDisplayOptions = useMemo(() => {
                const opts = leftQ.options.map((text, idx) => ({ text, originalLetter: String.fromCharCode(65 + idx) }));
                return battleState.shuffleOptions ? shuffleArray(opts) : opts;
            }, [leftQ.id, battleState.shuffleOptions, left.index]);

            const rightDisplayOptions = useMemo(() => {
                const opts = rightQ.options.map((text, idx) => ({ text, originalLetter: String.fromCharCode(65 + idx) }));
                return battleState.shuffleOptions ? shuffleArray(opts) : opts;
            }, [rightQ.id, battleState.shuffleOptions, right.index]);

            const handleLeftSubmit = () => {
                const isCorrect = left.userAnswer.split('').sort().join('') === leftQ.answer.split('').sort().join('');
                updateStats(leftQ.id, isCorrect);
                const newLeft = { ...left, userAnswer: '', answered: true };
                if (isCorrect) newLeft.correct = left.correct + 1;
                if (left.index < left.questions.length - 1) {
                    newLeft.index = left.index + 1;
                    newLeft.timeLeft = battleState.timeLimit;
                }
                else { newLeft.done = true; newLeft.timeSpent = Date.now() - battleState.startTime; }
                setBattleState(prev => ({ ...prev, left: newLeft }));
            };

            const handleRightSubmit = () => {
                const isCorrect = right.userAnswer.split('').sort().join('') === rightQ.answer.split('').sort().join('');
                updateStats(rightQ.id, isCorrect);
                const newRight = { ...right, userAnswer: '', answered: true };
                if (isCorrect) newRight.correct = right.correct + 1;
                if (right.index < right.questions.length - 1) {
                    newRight.index = right.index + 1;
                    newRight.timeLeft = battleState.timeLimit;
                }
                else { newRight.done = true; newRight.timeSpent = Date.now() - battleState.startTime; }
                setBattleState(prev => ({ ...prev, right: newRight }));
            };

            useEffect(() => {
                if (battleState.left.done && battleState.right.done) {
                    setBattleState(prev => ({ ...prev, phase: 'result' }));
                }
            }, [battleState.left.done, battleState.right.done, setBattleState]);

            if (phase === 'result') {
                const l = battleState.left, r = battleState.right;
                const lTotal = l.questions.length, rTotal = r.questions.length;
                const lTime = l.timeSpent || (Date.now() - battleState.startTime);
                const rTime = r.timeSpent || (Date.now() - battleState.startTime);
                let winner = 'draw';
                if (l.correct > r.correct) winner = 'left';
                else if (r.correct > l.correct) winner = 'right';
                else {
                    if (lTime < rTime) winner = 'left';
                    else if (rTime < lTime) winner = 'right';
                }

                return (
                    <div className="max-w-4xl mx-auto space-y-4">
                        <div className="text-center">
                            <h2 className={THEME_CLASSES.title}>对战结果</h2>
                        </div>
                        <div className="text-center py-4">
                            <p className="text-2xl font-bold text-themeRed">
                                {winner === 'draw' ? '平局！' : winner === 'left' ? '红方胜！' : '蓝方胜！'}
                            </p>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div className={`p-6 border-2 rounded-sm text-center space-y-3 ${winner === 'left' ? 'border-themeRed bg-themeRed/5' : winner === 'draw' ? 'border-themeRed/20' : 'border-themeRed/10'}`}>
                                <p className="text-lg font-bold text-themeRed">红方</p>
                                <p className="text-4xl font-bold">{l.correct} / {lTotal}</p>
                                <p className="text-xs opacity-50">用时 {formatTime(lTime)}</p>
                                <p className="text-sm">正确率 {(l.correct / lTotal * 100).toFixed(1)}%</p>
                            </div>
                            <div className={`p-6 border-2 rounded-sm text-center space-y-3 ${winner === 'right' ? 'border-themeRed bg-themeRed/5' : winner === 'draw' ? 'border-themeRed/20' : 'border-themeRed/10'}`}>
                                <p className="text-lg font-bold text-themeRed">蓝方</p>
                                <p className="text-4xl font-bold">{r.correct} / {rTotal}</p>
                                <p className="text-xs opacity-50">用时 {formatTime(rTime)}</p>
                                <p className="text-sm">正确率 {(r.correct / rTotal * 100).toFixed(1)}%</p>
                            </div>
                        </div>
                        <div className="text-center pt-4 flex gap-4 justify-center">
                            <button onClick={() => startBattle(battleState.lastConfig || { count: lTotal, timeLimit: battleState.timeLimit, tags: [], difficulties: [], shuffleOptions: battleState.shuffleOptions })} className={THEME_CLASSES.button}>再来一局</button>
                            <button onClick={() => setMode('home')} className={THEME_CLASSES.secondaryButton}>返回主页</button>
                        </div>
                    </div>
                );
            }

            const renderSide = (side, q, displayOpts, userAnswer, onSubmit, index, total, correct, isDone, timeLeft, timeLimit) => {
                const isLeft = side === 'left';
                const borderColor = isLeft ? 'border-l-4 border-l-themeRed' : 'border-r-4 border-r-blue-600';
                const answerColor = isLeft ? 'bg-themeRed text-white border-themeRed' : 'bg-blue-600 text-white border-blue-600';
                const hoverColor = isLeft ? 'hover:border-themeRed/30' : 'hover:border-blue-600/30';
                const label = isLeft ? '红方' : '蓝方';

                if (isDone) {
                    return (
                        <div className={`p-8 space-y-4 ${borderColor} flex flex-col items-center justify-center min-h-[300px] opacity-60`}>
                            <div className="animate-pulse text-4xl mb-4">&#8987;</div>
                            <p className="text-lg font-bold text-themeRed">{label} 已完成</p>
                            <p className="text-sm opacity-50">答对 <b className="text-themeRed">{correct}</b> / {total} 题</p>
                            <p className="text-sm opacity-40 mt-2">等待对方答完...</p>
                        </div>
                    );
                }

                return (
                    <div className={`p-4 space-y-4 ${borderColor}`}>
                        <div className="flex justify-between items-center">
                            <span className="font-bold text-sm">{label}</span>
                            <div className="flex items-center gap-3">
                                <span className="text-xs opacity-50">{index + 1} / {total}</span>
                                <span className="text-xs">答对: <b className="text-themeRed">{correct}</b></span>
                                {timeLimit > 0 && timeLeft > 0 && (
                                    <span className={`text-lg font-title ${timeLeft < 10 ? 'text-red-600 animate-pulse' : 'text-themeRed'}`}>
                                        <Icons.Clock/> {timeLeft}s
                                    </span>
                                )}
                                {timeLimit > 0 && timeLeft <= 0 && (
                                    <span className="text-lg font-title text-red-600 animate-pulse">
                                        <Icons.Clock/> 超时
                                    </span>
                                )}
                                <span className="text-xs opacity-40">{formatTime(battleTimer)}</span>
                            </div>
                        </div>
                        <p className="text-base leading-relaxed">{q.stem}</p>
                        <div className="space-y-2">
                            {displayOpts.map((opt, i) => {
                                const letter = String.fromCharCode(65 + i);
                                const isSelected = userAnswer.includes(opt.originalLetter);
                                return (
                                    <button key={i}
                                        onClick={() => {
                                            const newUA = userAnswer.includes(opt.originalLetter)
                                                ? userAnswer.replace(opt.originalLetter, '')
                                                : userAnswer + opt.originalLetter;
                                            setBattleState(prev => ({
                                                ...prev,
                                                [side]: { ...prev[side], userAnswer: newUA }
                                            }));
                                        }}
                                        className={`w-full text-left p-2 border transition-all flex items-center gap-3 text-sm ${isSelected ? answerColor : 'border-themeRed/10 ' + hoverColor}`}>
                                        <span className={`w-6 h-6 flex items-center justify-center border rounded-full text-xs flex-shrink-0 ${isSelected ? 'border-white' : 'border-themeRed/20'}`}>{letter}</span>
                                        {opt.text}
                                    </button>
                                );
                            })}
                        </div>
                        <button onClick={onSubmit} disabled={!userAnswer} className={`${isLeft ? THEME_CLASSES.button : 'px-4 py-1.5 bg-blue-600 text-white font-serif hover:bg-blue-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-[1px_1px_0px_rgba(0,0,0,0.2)] active:translate-y-[1px] active:shadow-none text-sm'} w-full py-2`}>提交</button>
                    </div>
                );
            };

            return (
                <div className="max-w-7xl mx-auto space-y-4">
                    <div className="flex justify-between items-center">
                        <h2 className={THEME_CLASSES.title}>同步对战</h2>
                        <button onClick={() => setMode('home')} className={THEME_CLASSES.secondaryButton}>结束对战</button>
                    </div>
                    <div className="grid grid-cols-2 gap-12">
                        {renderSide('left', leftQ, leftDisplayOptions, left.userAnswer, handleLeftSubmit, left.index, left.questions.length, left.correct, left.done, left.timeLeft, battleState.timeLimit)}
                        {renderSide('right', rightQ, rightDisplayOptions, right.userAnswer, handleRightSubmit, right.index, right.questions.length, right.correct, right.done, right.timeLeft, battleState.timeLimit)}
                    </div>
                </div>
            );
        };

        // --- Main App ---
        function App() {
            const [questions, setQuestions] = useState(() => {
                const saved = localStorage.getItem('choice_bank_questions');
                return saved ? JSON.parse(saved) : [];
            });
            const [favorites, setFavorites] = useState(() => JSON.parse(localStorage.getItem('choice_bank_favorites') || '[]'));
            const [originalFileName, setOriginalFileName] = useState(() => localStorage.getItem('choice_bank_filename') || "题库导出");
            const [lastPracticeIndex, setLastPracticeIndex] = useState(() => Number(localStorage.getItem('choice_bank_last_index')) || 0);

            const [testStartTime, setTestStartTime] = useState(null);
            const [testEndTime, setTestEndTime] = useState(null);

            const [mode, setMode] = useState('home');
            const [searchQuery, setSearchQuery] = useState('');
            const [filterTags, setFilterTags] = useState([]);
            const [filterDifficulty, setFilterDifficulty] = useState([]);
            const [filterFavorites, setFilterFavorites] = useState(false);
            const [selectedIds, setSelectedIds] = useState([]);
            
            const [editingQuestion, setEditingQuestion] = useState(null);
            const [practiceState, setPracticeState] = useState(null);
            const [examConfig, setExamConfig] = useState({
                tags: [], difficulties: [], count: 10, timeLimit: 20, shuffleQuestions: true, shuffleOptions: true,
            });
            const [examState, setExamState] = useState(null);
            const [battleState, setBattleState] = useState(null);
            const [battleTimer, setBattleTimer] = useState(0);
            const [lastExamResult, setLastExamResult] = useState(null);

            // Modal States
            const [deleteModal, setDeleteModal] = useState({ isOpen: false, ids: [] });
            const [clearModal, setClearModal] = useState(false);
            const [examFailModal, setExamFailModal] = useState({ isOpen: false, reason: '', answered: 0 });
            const [importModal, setImportModal] = useState({ isOpen: false, pendingQuestions: [] });
            const [infoModal, setInfoModal] = useState({ isOpen: false, title: '', message: '' });

            const fileInputRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('choice_bank_questions', JSON.stringify(questions));
                localStorage.setItem('choice_bank_favorites', JSON.stringify(favorites));
            }, [questions, favorites]);

            useEffect(() => {
                let timer;
                if (mode === 'exam' && examState && !examState.endTime) {
                    timer = setInterval(() => {
                        setExamState(prev => {
                            if (!prev || prev.timeLeft <= 0) {
                                if (prev && prev.timeLeft <= 0) {
                                    setExamFailModal({ isOpen: true, reason: '时间到', answered: prev.index });
                                    return { ...prev, endTime: Date.now() };
                                }
                                return prev;
                            }
                            return { ...prev, timeLeft: prev.timeLeft - 1 };
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [examState]);

            useEffect(() => {
                let timer;
                if (mode === 'battle' && battleState && battleState.phase === 'playing') {
                    timer = setInterval(() => {
                        setBattleTimer(Date.now() - battleState.startTime);
                        if (battleState.timeLimit > 0) {
                            setBattleState(prev => {
                                if (prev.phase !== 'playing') return prev;
                                const updated = { ...prev };
                                ['left', 'right'].forEach(side => {
                                    if (!prev[side].done && prev[side].timeLeft <= 0) {
                                        const q = prev[side].questions[prev[side].index];
                                        updateStats(q.id, false);
                                        const s = { ...prev[side], userAnswer: '', answered: true, timeLeft: -1 };
                                        if (prev[side].index < prev[side].questions.length - 1) {
                                            s.index = prev[side].index + 1;
                                            s.timeLeft = prev.timeLimit;
                                        } else {
                                            s.done = true;
                                            s.timeSpent = Date.now() - prev.startTime;
                                        }
                                        updated[side] = s;
                                    } else if (!prev[side].done && prev[side].timeLeft > 0) {
                                        const s = { ...prev[side], timeLeft: prev[side].timeLeft - 1 };
                                        updated[side] = s;
                                    }
                                });
                                return updated;
                            });
                        }
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [mode, battleState]);

            const allTags = useMemo(() => {
                const tags = new Set();
                questions.forEach(q => q.tags.forEach(t => tags.add(t)));
                return Array.from(tags);
            }, [questions]);

            const examFilteredCount = useMemo(() => {
                return questions.filter(q => {
                    const matchesTags = examConfig.tags.length === 0 || examConfig.tags.some(t => q.tags.includes(t));
                    const matchesDifficulty = examConfig.difficulties.length === 0 || examConfig.difficulties.includes(getDifficulty(q));
                    return matchesTags && matchesDifficulty;
                }).length;
            }, [questions, examConfig]);

            const filteredQuestions = useMemo(() => {
                return questions.filter(q => {
                    const searchLower = searchQuery.toLowerCase();
                    const matchesSearch = q.stem.toLowerCase().includes(searchLower) || (q.remark && q.remark.toLowerCase().includes(searchLower));
                    const matchesTags = filterTags.length === 0 || filterTags.some(t => q.tags.includes(t));
                    const matchesDifficulty = filterDifficulty.length === 0 || filterDifficulty.includes(getDifficulty(q));
                    const matchesFavorites = !filterFavorites || favorites.includes(q.id);
                    return matchesSearch && matchesTags && matchesDifficulty && matchesFavorites;
                });
            }, [questions, searchQuery, filterTags, filterDifficulty, filterFavorites, favorites]);

            const updateStats = useCallback((id, isCorrect) => {
                setQuestions(prev => prev.map(q =>
