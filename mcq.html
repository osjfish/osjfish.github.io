                    q.id === id ? { ...q, practiceCount: q.practiceCount + 1, correctCount: q.correctCount + (isCorrect ? 1 : 0) } : q
                ));
            }, []);

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const fileName = file.name.replace(/\.[^/.]+$/, "");
                setOriginalFileName(fileName);
                localStorage.setItem('choice_bank_filename', fileName);

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const data = XLSX.utils.sheet_to_json(ws);
                    const newQuestions = data.map(row => {
                        const options = [];
                        ['选项1', '选项2', '选项3', '选项4', '选项5', '选项6', 'A', 'B', 'C', 'D'].forEach(k => {
                            if (row[k]) options.push(String(row[k]));
                        });
                        let answer = "";
                        ['答案', '正确答案', 'Answer', 'Key', '正确项'].forEach(k => {
                            if (row[k]) answer = String(row[k]).toUpperCase().replace(/\s/g, '');
                        });
                        return {
                            id: Math.random().toString(36).substr(2, 9),
                            type: row['题型'] || '单选题',
                            stem: row['题干'] || row['题目'] || '',
                            options,
                            answer,
                            analysis: row['解析'] || '',
                            tags: String(row['标签'] || '').split(/[，,]/).filter(Boolean),
                            remark: row['备注'] || '',
                            practiceCount: Number(row['练习次数'] || 0), 
                            correctCount: Number(row['正确次数'] || 0), 
                            isFavorited: row['收藏'] === '是',
                            createdAt: Date.now(),
                        };
                    }).filter(q => q.stem);

                    if (questions.length > 0) {
                        setImportModal({ isOpen: true, pendingQuestions: newQuestions });
                    } else {
                        setQuestions(newQuestions);
                        const newFavs = newQuestions.filter(q => q.isFavorited).map(q => q.id);
                        setFavorites(newFavs);
                        setInfoModal({ isOpen: true, title: '提示', message: `成功导入 ${newQuestions.length} 道题目，恢复 ${newFavs.length} 个收藏` });
                    }
                };
                reader.readAsBinaryString(file);
                e.target.value = null;
            };

            const handleImportAction = (action) => {
                const newQs = importModal.pendingQuestions;
                if (action === 'merge') {
                    const existingKeys = new Set(questions.map(q => `${q.stem}|${q.options.join(',')}|${q.answer}`));
                    const uniqueNew = newQs.filter(q => !existingKeys.has(`${q.stem}|${q.options.join(',')}|${q.answer}`));
                    setQuestions(prev => [...prev, ...uniqueNew]);
                    const newFavs = uniqueNew.filter(q => q.isFavorited).map(q => q.id);
                    setFavorites(prev => [...prev, ...newFavs]);
                    setInfoModal({ isOpen: true, title: '提示', message: `合并完成：新增 ${uniqueNew.length} 道题目，跳过 ${newQs.length - uniqueNew.length} 道重复题，恢复 ${newFavs.length} 个收藏` });
                } else if (action === 'overwrite') {
                    setQuestions(newQs);
                    const newFavs = newQs.filter(q => q.isFavorited).map(q => q.id);
                    setFavorites(newFavs);
                    setInfoModal({ isOpen: true, title: '提示', message: `覆盖完成：共导入 ${newQs.length} 道题目，恢复 ${newFavs.length} 个收藏` });
                }
                setImportModal({ isOpen: false, pendingQuestions: [] });
            };

            const handleExportExcel = () => {
                const exportData = questions.map(q => ({
                    '题型': q.type, '题干': q.stem,
                    ...Object.fromEntries(q.options.map((opt, i) => [`选项${i + 1}`, opt])),
                    '答案': q.answer, '解析': q.analysis, '标签': q.tags.join(','), '备注': q.remark,
                    '练习次数': q.practiceCount, '正确次数': q.correctCount,
                    '收藏': favorites.includes(q.id) ? '是' : '否',
                }));
                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "题库");
                const now = new Date();
                const timeStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
                const baseName = originalFileName.replace(/_\d{8}_\d{4}$/, "");
                XLSX.writeFile(wb, `${baseName}_${timeStr}.xlsx`);
            };

            const startPractice = (config) => {
                let pool = questions.filter(q => {
                    const matchesTags = config.tags.length === 0 || config.tags.some(t => q.tags.includes(t));
                    const matchesDifficulty = config.difficulties.length === 0 || config.difficulties.includes(getDifficulty(q));
                    return matchesTags && matchesDifficulty;
                });
                if (pool.length === 0) return setInfoModal({ isOpen: true, title: '提示', message: '符合条件的题目不足' });
                let list = config.type === 'random' ? shuffleArray(pool) : pool;
                let startIndex = (config.continue && lastPracticeIndex > 0) ? lastPracticeIndex : 0;
                setPracticeState({ list, index: startIndex, showAnswer: false, userAnswer: '', shuffleOptions: config.shuffleOptions, type: config.type });
                setMode('practice');
            };

            const startExam = () => {
                let pool = questions.filter(q => {
                    const matchesTags = examConfig.tags.length === 0 || examConfig.tags.some(t => q.tags.includes(t));
                    const matchesDifficulty = examConfig.difficulties.length === 0 || examConfig.difficulties.includes(getDifficulty(q));
                    return matchesTags && matchesDifficulty;
                });
                if (pool.length < examConfig.count) return setInfoModal({ isOpen: true, title: '提示', message: `符合条件的题目不足 (当前 ${pool.length} 题)` });
                let selected = examConfig.shuffleQuestions ? shuffleArray(pool) : pool;
                setTestStartTime(Date.now());
                setTestEndTime(null);
                setExamState({ questions: selected.slice(0, examConfig.count), index: 0, timeLeft: Number(examConfig.timeLimit), timeLimit: Number(examConfig.timeLimit), userAnswer: '', startTime: Date.now(), shuffleOptions: examConfig.shuffleOptions });
                setMode('exam');
            };

            const startBattle = (config) => {
                let pool = questions.filter(q => {
                    const matchesTags = config.tags.length === 0 || config.tags.some(t => q.tags.includes(t));
                    const matchesDifficulty = config.difficulties.length === 0 || config.difficulties.includes(getDifficulty(q));
                    return matchesTags && matchesDifficulty;
                });
                if (pool.length < config.count) return setInfoModal({ isOpen: true, title: '提示', message: `符合条件的题目不足 (当前 ${pool.length} 题)` });
                const selected = shuffleArray(pool).slice(0, config.count);
                const leftQuestions = shuffleArray(selected);
                const rightQuestions = shuffleArray(selected);
                setBattleState({
                    left: { questions: leftQuestions, index: 0, userAnswer: '', correct: 0, done: false, startTime: Date.now(), timeSpent: 0, timeLeft: config.timeLimit },
                    right: { questions: rightQuestions, index: 0, userAnswer: '', correct: 0, done: false, startTime: Date.now(), timeSpent: 0, timeLeft: config.timeLimit },
                    shuffleOptions: config.shuffleOptions,
                    phase: 'playing',
                    startTime: Date.now(),
                    timeLimit: config.timeLimit,
                    lastConfig: config,
                });
                setMode('battle');
            };

            const saveQuestion = (q) => {
                if (editingQuestion) setQuestions(prev => prev.map(item => item.id === editingQuestion.id ? { ...item, ...q } : item));
                else setQuestions(prev => [{ id: Math.random().toString(36).substr(2, 9), ...q, createdAt: Date.now() }, ...prev]);
                setEditingQuestion(null);
                setMode('home');
            };

            const handleExamSuccess = () => {
                setTestEndTime(Date.now());
                if (examState) {
                    setLastExamResult({ score: examState.questions.length, time: new Date().toLocaleString() });
                }
                setExamState(null);
                setMode('certificate');
                if (typeof confetti === 'function') {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <nav className="max-w-7xl mx-auto flex justify-between items-center mb-6 border-b border-themeRed/10 pb-3">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setMode('home')}>
                            <div className="bg-themeRed text-white p-1.5 font-title text-xl w-10 h-10 flex items-center justify-center">选</div>
                            <h1 className="text-xl font-title tracking-widest">选择题库</h1>
                        </div>
                        <div className="flex gap-6 font-serif text-sm">
                            <button onClick={() => setMode('home')} className={mode === 'home' ? 'text-themeRed border-b border-themeRed' : 'opacity-40'}>题库</button>
                            <button onClick={() => questions.length > 0 ? setMode('practice_config') : setInfoModal({ isOpen: true, title: '提示', message: '题库为空，请先添加题目' })} className={mode === 'practice_config' || mode === 'practice' ? 'text-themeRed border-b border-themeRed' : 'opacity-40'}>练习</button>
                            <button onClick={() => questions.length > 0 ? setMode('exam_config') : setInfoModal({ isOpen: true, title: '提示', message: '题库为空，请先添加题目' })} className={mode === 'exam_config' || mode === 'exam' ? 'text-themeRed border-b border-themeRed' : 'opacity-40'}>检测</button>
                            <button onClick={() => questions.length > 0 ? setMode('battle_config') : setInfoModal({ isOpen: true, title: '提示', message: '题库为空，请先添加题目' })} className={mode === 'battle_config' || mode === 'battle' ? 'text-themeRed border-b border-themeRed' : 'opacity-40'}>对战</button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto">
                        <input type="file" ref={fileInputRef} hidden accept=".xlsx, .xls" onChange={handleFileSelect}/>
                        {mode === 'home' && <Home questions={questions} filteredQuestions={filteredQuestions} searchQuery={searchQuery} setSearchQuery={setSearchQuery} filterTags={filterTags} setFilterTags={setFilterTags} filterDifficulty={filterDifficulty} setFilterDifficulty={setFilterDifficulty} filterFavorites={filterFavorites} setFilterFavorites={setFilterFavorites} allTags={allTags} setMode={setMode} setEditingQuestion={setEditingQuestion} onImportClick={() => fileInputRef.current.click()} handleExportExcel={handleExportExcel} setQuestions={setQuestions} selectedIds={selectedIds} setSelectedIds={setSelectedIds} confirmDelete={(ids) => setDeleteModal({ isOpen: true, ids })} confirmClear={() => setClearModal(true)} setInfoModal={setInfoModal} setFavorites={setFavorites} favorites={favorites} />}
                        {mode === 'edit' && <Edit editingQuestion={editingQuestion} saveQuestion={(q) => { if (editingQuestion) setQuestions(prev => prev.map(item => item.id === q.id ? q : item)); else setQuestions(prev => [...prev, q]); setMode('home'); }} setMode={setMode} />}
                        {mode === 'practice_config' && <PracticeConfig allTags={allTags} startPractice={startPractice} lastIndex={lastPracticeIndex} setMode={setMode} questions={questions} setLastPracticeIndex={setLastPracticeIndex} setInfoModal={setInfoModal} />}
                        {mode === 'practice' && <Practice practiceState={practiceState} setPracticeState={setPracticeState} setMode={setMode} updateStats={updateStats} setLastPracticeIndex={setLastPracticeIndex} setFavorites={setFavorites} favorites={favorites} setEditingQuestion={setEditingQuestion} confirmDelete={(ids) => setDeleteModal({ isOpen: true, ids })} />}
                        {mode === 'exam' && <Exam examState={examState} setExamState={setExamState} handleExamFail={(reason, answered) => setExamFailModal({ isOpen: true, reason, answered })} handleExamSuccess={handleExamSuccess} updateStats={updateStats} />}
                        {mode === 'battle_config' && <BattleConfig allTags={allTags} setMode={setMode} questions={questions} setInfoModal={setInfoModal} startBattle={startBattle} />}
                        {mode === 'text_import' && <TextImport setMode={setMode} setQuestions={setQuestions} setInfoModal={setInfoModal} questions={questions} />}
                        {mode === 'battle' && <Battle battleState={battleState} setBattleState={setBattleState} setMode={setMode} updateStats={updateStats} battleTimer={battleTimer} startBattle={startBattle} />}
                        {mode === 'exam_config' && (
                            <div className="max-w-md mx-auto space-y-4">
                                <h2 className={THEME_CLASSES.title}>检测准备</h2>
                                <div className={THEME_CLASSES.card + " space-y-4"}>
                                    <div>
                                        <label className="text-xs opacity-50 block mb-1">题目数量</label>
                                        <input type="number" min="1" className={THEME_CLASSES.input} value={examConfig.count} onChange={e => setExamConfig({...examConfig, count: parseInt(e.target.value) || 1})}/>
                                    </div>
                                    <div>
                                        <label className="text-xs opacity-50 block mb-1">单题限时 (秒)</label>
                                        <input type="number" min="1" className={THEME_CLASSES.input} value={examConfig.timeLimit} onChange={e => setExamConfig({...examConfig, timeLimit: parseInt(e.target.value) || 1})}/>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs opacity-50 block mb-2">筛选标签</label>
                                        <div className="flex flex-wrap gap-2">
                                            {allTags.map(t => (
                                                <button key={t} onClick={() => setExamConfig({...examConfig, tags: examConfig.tags.includes(t) ? examConfig.tags.filter(i => i !== t) : [...examConfig.tags, t]})}
                                                    className={`px-2 py-0.5 text-xs border ${examConfig.tags.includes(t) ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/20'}`}>{t}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs opacity-50 block mb-2">筛选难度</label>
                                        <div className="flex gap-2">
                                            {['未练习', '易', '中', '难'].map(d => (
                                                <button key={d} onClick={() => setExamConfig({...examConfig, difficulties: examConfig.difficulties.includes(d) ? examConfig.difficulties.filter(i => i !== d) : [...examConfig.difficulties, d]})}
                                                    className={`px-3 py-1 text-xs border ${examConfig.difficulties.includes(d) ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/20'}`}>{d}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex gap-4">
                                        <label className="flex items-center gap-2 text-xs cursor-pointer">
                                            <input type="checkbox" checked={examConfig.shuffleQuestions} onChange={e => setExamConfig({...examConfig, shuffleQuestions: e.target.checked})}/> 打乱题序
                                        </label>
                                        <label className="flex items-center gap-2 text-xs cursor-pointer">
                                            <input type="checkbox" checked={examConfig.shuffleOptions} onChange={e => setExamConfig({...examConfig, shuffleOptions: e.target.checked})}/> 打乱项序
                                        </label>
                                    </div>
                                    <p className="text-[10px] opacity-40">当前筛选条件下共有 <span className="text-themeRed font-bold">{examFilteredCount}</span> 道题目</p>
                                    <button onClick={() => {
                                        if (examFilteredCount < examConfig.count) return setInfoModal({ isOpen: true, title: '提示', message: `符合条件的题目不足 (当前 ${examFilteredCount} 题)` });
                                        startExam();
                                    }} className={THEME_CLASSES.button + " w-full py-3"}>开启检测</button>
                                    <button onClick={() => setMode('home')} className={THEME_CLASSES.secondaryButton + " w-full"}>返回</button>
                                </div>
                            </div>
                        )}
                        {mode === 'certificate' && lastExamResult && (
                            <div className="max-w-3xl mx-auto text-center space-y-6">
                                <div id="cert-render" className="bg-themePaper border-[10px] border-themeRed p-10 aspect-[1.4/1] flex flex-col items-center justify-center relative overflow-hidden">
                                    <div className="absolute inset-0 opacity-5 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#A93226 1px, transparent 1px)', backgroundSize: '15px 15px' }}></div>
                                    <h1 className="text-6xl font-title text-themeRed mb-6 tracking-widest">荣誉证书</h1>
                                    <div className="space-y-4 text-xl leading-loose">
                                        <p>在本次 <span className="text-themeRed font-bold">选择题库</span> 实战检测中</p>
                                        <p>表现出色，连续答对 <span className="text-themeRed font-bold text-3xl">{lastExamResult.score}</span> 道题目</p>
                                        <p>特发此证，以资鼓励</p>
                                    </div>

                                    <div className="mt-10 pt-6 border-t border-themeRed/10 grid grid-cols-2 gap-x-12 gap-y-2 text-left text-[10px] font-serif text-themeRed/60 w-full max-w-md">
                                        <p>● 检测时长：<span className="text-themeRed font-bold">
                                            {(() => {
                                                const seconds = Math.floor(((testEndTime || Date.now()) - (testStartTime || Date.now())) / 1000);
                                                const m = Math.floor(seconds / 60);
                                                const s = seconds % 60;
                                                return `${m}分${s}秒`;
                                            })()}
                                        </span></p>
                                        <p>● 检测题数：<span className="text-themeRed font-bold">{examConfig.count} 题</span></p>
                                        <p>● 题目乱序：<span className="text-themeRed font-bold">{examConfig.shuffleQuestions ? '已开启' : '未开启'}</span></p>
                                        <p>● 选项乱序：<span className="text-themeRed font-bold">{examConfig.shuffleOptions ? '已开启' : '未开启'}</span></p>
                                        <p>● 签发时间：<span className="text-themeRed font-bold">{lastExamResult.time}</span></p>
                                        <p>● 证书编号：<span className="text-themeRed font-bold">CERT-{Math.random().toString(36).substr(2, 6).toUpperCase()}</span></p>
                                    </div>

                                    <div className="absolute bottom-10 left-10 w-20 h-20 border-2 border-themeRed rounded-full flex items-center justify-center rotate-[-15deg] opacity-40">
                                        <span className="text-themeRed font-bold text-[10px] text-center">选择题库<br/>认证之印</span>
                                    </div>
                                </div>
                                <div className="flex gap-4 justify-center">
                                    <button onClick={async () => {
                                        const element = document.getElementById('cert-render');
                                        const canvas = await html2canvas(element);
                                        const link = document.createElement('a');
                                        link.download = `荣誉证书_${Date.now()}.png`;
                                        link.href = canvas.toDataURL();
                                        link.click();
                                    }} className={THEME_CLASSES.button}>下载奖状</button>
                                    <button onClick={() => setMode('home')} className={THEME_CLASSES.secondaryButton}>返回主页</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    <Modal isOpen={deleteModal.isOpen} onClose={() => setDeleteModal({ isOpen: false, ids: [] })} title="确认删除" footer={<><button onClick={() => setDeleteModal({ isOpen: false, ids: [] })} className={THEME_CLASSES.secondaryButton}>取消</button><button onClick={() => { setQuestions(prev => prev.filter(q => !deleteModal.ids.includes(q.id))); setSelectedIds(prev => prev.filter(id => !deleteModal.ids.includes(id))); setDeleteModal({ isOpen: false, ids: [] }); }} className="px-4 py-1.5 bg-red-700 text-white font-serif text-sm">确认删除</button></>}>确定要删除选中的 {deleteModal.ids.length} 道题目吗？</Modal>
                    
                    <Modal isOpen={clearModal} onClose={() => setClearModal(false)} title="清空题库" footer={<><button onClick={() => setClearModal(false)} className={THEME_CLASSES.secondaryButton}>取消</button><button onClick={() => { setQuestions([]); setSelectedIds([]); setClearModal(false); }} className="px-4 py-1.5 bg-red-700 text-white font-serif text-sm">确认清空</button></>}>确定要清空所有题库数据吗？此操作将不可逆转！</Modal>

                    <Modal isOpen={importModal.isOpen} onClose={() => setImportModal({ isOpen: false, pendingQuestions: [] })} title="导入选项" footer={<><button onClick={() => handleImportAction('merge')} className={THEME_CLASSES.button}>合并导入</button><button onClick={() => handleImportAction('overwrite')} className="px-4 py-1.5 bg-red-700 text-white font-serif text-sm">覆盖现有</button><button onClick={() => setImportModal({ isOpen: false, pendingQuestions: [] })} className={THEME_CLASSES.secondaryButton}>取消</button></>}>检测到题库已有题目。请选择：<br/>1. <b>合并导入</b>：保留现有题目，仅导入不重复的新题。<br/>2. <b>覆盖现有</b>：清空当前题库，仅保留新导入的题目。</Modal>

                    <Modal isOpen={infoModal.isOpen} onClose={() => setInfoModal({ isOpen: false, title: '', message: '' })} title={infoModal.title} footer={<button onClick={() => setInfoModal({ isOpen: false, title: '', message: '' })} className={THEME_CLASSES.button}>确定</button>}>{infoModal.message}</Modal>

                    <Modal isOpen={examFailModal.isOpen} onClose={() => { setExamFailModal({ isOpen: false, reason: '', answered: 0 }); setMode('home'); }} title="检测未通过" footer={<button onClick={() => { setExamFailModal({ isOpen: false, reason: '', answered: 0 }); setMode('home'); }} className={THEME_CLASSES.button}>返回主页</button>}>
                        <div className="text-center space-y-4">
                            <Icons.Alert className="w-12 h-12 text-themeRed mx-auto opacity-50"/>
                            <p className="text-lg font-bold">遗憾！本次检测未通过</p>
                            <p className="opacity-60">失败原因：{examFailModal.reason}</p>
                            <div className="pt-2 border-t border-themeRed/10">
                                <p className="text-sm">已连续答对 <span className="text-2xl font-bold text-themeRed">{examFailModal.answered}</span> / {examConfig.count} 题</p>
                                <p className="text-[10px] opacity-40 mt-1">距离通关还差 {examConfig.count - examFailModal.answered} 题</p>
                            </div>
                        </div>
                    </Modal>

                    <footer className="mt-12 py-6 text-center font-serif text-themeRed/20 text-xs"><div className="flex justify-center gap-3"><span>——</span><span>选择题库 · 专注高效</span><span>——</span></div></footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
