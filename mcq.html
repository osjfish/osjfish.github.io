<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择题库</title>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <style>
        :root {
            --paper: #FDF6E3;
            --ink: #2C3E50;
            --red: #A93226;
        }

        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Noto Serif SC', serif;
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
            font-size: 14px;
        }

        .title-font {
            font-family: 'ZCOOL XiaoWei', serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(169, 50, 38, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(169, 50, 38, 0.2);
            border-radius: 2px;
        }

        .icon-svg {
            width: 1.1em;
            height: 1.1em;
            display: inline-block;
            vertical-align: middle;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .modal-overlay {
            background-color: rgba(44, 62, 80, 0.6);
            backdrop-filter: blur(2px);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Noto Serif SC', 'serif'],
                        title: ['ZCOOL XiaoWei', 'serif'],
                    },
                    colors: {
                        themeRed: '#A93226',
                        themePaper: '#FDF6E3',
                        themeInk: '#2C3E50',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- Icons ---
        const Icons = {
            Plus: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Upload: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Download: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Search: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Edit: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Trash: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Clock: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Check: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>,
            X: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Alert: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            History: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
            Brain: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 2.38 1.19 4.47 3 5.74V17a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-2.26c1.81-1.27 3-3.36 3-5.74a7 7 0 0 0-7-7z"/><line x1="9" y1="21" x2="15" y2="21"/><line x1="10" y1="23" x2="14" y2="23"/></svg>,
            Sparkles: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>,
            Wand: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/><path d="M17.8 11.8L19 13"/><path d="M15 9h0"/><path d="M17.8 6.2L19 5"/><path d="m3 21 9-9"/><path d="M12.2 6.2L11 5"/></svg>,
            Eraser: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="m22 21H7"/><path d="m5 11 9 9"/></svg>,
            Star: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            FileText: ({ className, ...props }) => <svg className={`icon-svg ${className || ""}`} {...props} viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
        };

        // --- Constants ---
        const THEME_CLASSES = {
            card: "bg-[#FDF6E3] border border-[#A93226]/20 shadow-[2px_2px_0px_rgba(169,50,38,0.05)] rounded-sm p-4 relative overflow-hidden",
            button: "px-4 py-1.5 bg-[#A93226] text-white font-serif hover:bg-[#8C2727] transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-[1px_1px_0px_rgba(0,0,0,0.2)] active:translate-y-[1px] active:shadow-none text-sm",
            secondaryButton: "px-4 py-1.5 border border-[#A93226] text-[#A93226] font-serif hover:bg-[#A93226]/5 transition-all text-sm",
            input: "w-full bg-transparent border-b border-[#A93226]/30 focus:border-[#A93226] outline-none h-9 px-1 font-serif transition-all text-sm appearance-none",
            title: "font-title text-2xl text-[#A93226] border-b-2 border-[#A93226] inline-block mb-4 pb-1",
            badge: "px-1.5 py-0.5 text-[10px] font-serif border border-[#A93226]/40 text-[#A93226] rounded-sm",
        };

        // --- Utils ---
        const getDifficulty = (q) => {
            if (q.practiceCount === 0) return '未练习';
            const rate = q.correctCount / q.practiceCount;
            if (rate >= 0.9) return '易';
            if (rate >= 0.7) return '中';
            return '难';
        };

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const formatTime = (ms) => {
            const totalSeconds = Math.floor(ms / 1000);
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            if (m > 0) return `${m}分${s}秒`;
            return `${s}秒`;
        };

        const cleanMarkdown = (text) => {
            if (!text) return '';
            return text
                .replace(/#{1,6}\s*/g, '')
                .replace(/\*\*(.*?)\*\*/g, '$1')
                .replace(/\*(.*?)\*/g, '$1')
                .replace(/__(.*?)__/g, '$1')
                .replace(/_(.*?)_/g, '$1')
                .replace(/~~(.*?)~~/g, '$1')
                .replace(/`(.*?)`/g, '$1')
                .replace(/^(\s*[-*+]\s)/gm, '')
                .replace(/^(\s*\d+\.\s)/gm, '')
                .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                .replace(/^>\s*/gm, '')
                .replace(/---+/g, '')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
        };

        // --- Components ---

        const Modal = ({ isOpen, onClose, title, children, footer, maxHeight }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay">
                    <div className="bg-[#FDF6E3] border-2 border-[#A93226] shadow-2xl max-w-md w-full p-6 space-y-4" style={{ maxHeight: maxHeight || 'none', overflow: maxHeight ? 'auto' : 'visible' }}>
                        <div className="flex justify-between items-center border-b border-[#A93226]/20 pb-2">
                            <h3 className="font-title text-xl text-themeRed">{title}</h3>
                            <button onClick={onClose} className="text-themeRed opacity-50 hover:opacity-100"><Icons.X/></button>
                        </div>
                        <div className="font-serif text-sm leading-relaxed">{children}</div>
                        <div className="flex justify-end gap-3 pt-2">{footer}</div>
                    </div>
                </div>
            );
        };

        const AI_PROVIDERS = [
            { name: 'DeepSeek', url: 'https://api.deepseek.com/v1/chat/completions', model: 'deepseek-chat', desc: '登录 deepseek.com → 控制台 → API Keys → 创建新 Key' },
            { name: '通义千问', url: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', model: 'qwen-plus', desc: '登录 dashscope.console.aliyun.com → API-KEY管理 → 创建 Key' },
            { name: '豆包', url: 'https://ark.cn-beijing.volces.com/api/v3/chat/completions', model: 'ep-20241228165556-4xk8r', desc: '登录 console.volcengine.com → 方舟大模型平台 → 创建推理接入点获取 Endpoint 和 Key' },
            { name: '智谱清言', url: 'https://open.bigmodel.cn/api/paas/v4/chat/completions', model: 'glm-4-flash', desc: '登录 open.bigmodel.cn → 控制台 → API Keys → 创建新 Key' },
            { name: '硅基流动', url: 'https://api.siliconflow.cn/v1/chat/completions', model: 'Qwen/Qwen2.5-72B-Instruct', desc: '登录 siliconflow.cn → 个人中心 → API Keys → 创建新 Key' },
            { name: 'Moonshot', url: 'https://api.moonshot.cn/v1/chat/completions', model: 'moonshot-v1-8k', desc: '登录 platform.moonshot.cn → 控制台 → API Keys → 创建新 Key' },
            { name: 'Ollama (本地)', url: 'http://localhost:11434/v1/chat/completions', model: 'qwen2.5:7b', desc: '安装 Ollama 后运行 ollama pull <模型名>，无需 Key，模型名称可自定义' },
        ];

        const AIGenerateModalContent = ({ setInfoModal, setQuestions, questions, allTags }) => {
            const savedProvider = localStorage.getItem('choice_bank_ai_provider') || 'DeepSeek';
            const provider = AI_PROVIDERS.find(p => p.name === savedProvider) || AI_PROVIDERS[0];
            const [selectedProvider, setSelectedProvider] = useState(savedProvider);
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('choice_bank_ai_key_' + savedProvider) || '');
            const [apiUrl, setApiUrl] = useState(() => localStorage.getItem('choice_bank_ai_url_' + savedProvider) || provider.url);
            const [model, setModel] = useState(() => localStorage.getItem('choice_bank_ai_model_' + savedProvider) || provider.model);
            const [topic, setTopic] = useState('');
            const [extraReq, setExtraReq] = useState('');
            const [count, setCount] = useState(5);
            const [type, setType] = useState('单选');
            const [difficulty, setDifficulty] = useState('中');
            const [tagHint, setTagHint] = useState('');
            const [loading, setLoading] = useState(false);
            const [preview, setPreview] = useState([]);

            const handleProviderChange = (name) => {
                localStorage.setItem('choice_bank_ai_key_' + selectedProvider, apiKey);
                localStorage.setItem('choice_bank_ai_url_' + selectedProvider, apiUrl);
                localStorage.setItem('choice_bank_ai_model_' + selectedProvider, model);
                setSelectedProvider(name);
                setApiKey(localStorage.getItem('choice_bank_ai_key_' + name) || '');
                setApiUrl(localStorage.getItem('choice_bank_ai_url_' + name) || AI_PROVIDERS.find(p => p.name === name)?.url || '');
                setModel(localStorage.getItem('choice_bank_ai_model_' + name) || AI_PROVIDERS.find(p => p.name === name)?.model || '');
            };

            const handleReset = () => {
                const p = AI_PROVIDERS.find(pr => pr.name === selectedProvider) || AI_PROVIDERS[0];
                setApiUrl(p.url);
                setModel(p.model);
                setApiKey('');
                localStorage.removeItem('choice_bank_ai_key_' + selectedProvider);
                localStorage.removeItem('choice_bank_ai_url_' + selectedProvider);
                localStorage.removeItem('choice_bank_ai_model_' + selectedProvider);
                setTopic('');
                setExtraReq('');
                setCount(5);
                setType('单选');
                setDifficulty('中');
                setTagHint('');
                setPreview([]);
            };

            const handleGenerate = async () => {
                if (!apiKey && selectedProvider !== 'Ollama (本地)') return setInfoModal({ isOpen: true, title: '提示', message: '请输入 API Key' });
                if (!topic) return setInfoModal({ isOpen: true, title: '提示', message: '请输入生成主题' });
                setLoading(true);
                try {
                    let prompt = `请生成${count}道关于"${topic}"的${type}题，难度为${difficulty}。
要求：
1. 题干清晰准确，选项具有迷惑性
2. 答案唯一且正确
3. 解析简明扼要，解析中不要使用"A选项"、"B选项"等字母代称，应直接引用选项的具体内容
4. 题干中不要使用"加点字"、"划线句"、"画线部分"、"文中画波浪线处"等需要视觉标记才能理解的表述，如需强调某内容请用引号或书名号标出
5. 选项内容不要包含A、B、C、D等字母前缀，只写选项正文，系统会自动添加字母编号
6. 不要使用任何markdown格式（不要用**、#、-等符号）`;
                    if (extraReq) prompt += `\n6. 附加要求：${extraReq}`;
                    if (tagHint) prompt += `\n${extraReq ? '7' : '6'}. 标签：请根据题目内容，结合以下提示为每道题打2-3个标签：${tagHint}`;
                    prompt += `\n\n请严格按以下JSON格式返回，不要包含任何其他文字。注意：选项内容和解析中如果包含双引号，请使用单引号代替：
[
  {
    "stem": "题干内容",
    "options": ["A选项", "B选项", "C选项", "D选项"],
    "answer": "A",
    "analysis": "解析内容"${tagHint ? ',\n    "tags": "标签1,标签2"' : ''}
  }
]`;
                    const headers = { 'Content-Type': 'application/json' };
                    if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;
                    const response = await fetch(apiUrl, {
                        method: 'POST', headers,
                        body: JSON.stringify({ model, messages: [{ role: 'user', content: prompt }], temperature: 0.8 }),
                    });
                    if (!response.ok) { const err = await response.json(); throw new Error(err.error?.message || `请求失败 (${response.status})`); }
                    const data = await response.json();
                    let content = data.choices[0].message.content.trim();
                    const jsonMatch = content.match(/```(?:json)?\s*([\s\S]*?)```/);
                    if (jsonMatch) content = jsonMatch[1].trim();
                    content = content.replace(/[""]/g, '"').replace(/['']/g, "'");
                    let parsed;
                    try {
                        parsed = JSON.parse(content);
                    } catch (e) {
                        const arrMatch = content.match(/\[[\s\S]*\]/);
                        if (arrMatch) {
                            let cleaned = arrMatch[0];
                            cleaned = cleaned.replace(/[""]/g, '"').replace(/['']/g, "'");
                            cleaned = cleaned.replace(/\\n/g, ' ').replace(/\\r/g, '');
                            try {
                                parsed = JSON.parse(cleaned);
                            } catch (e2) {
                                const lines = cleaned.split('\n');
                                let validJson = '';
                                for (let i = 0; i < lines.length; i++) {
                                    try {
                                        validJson = lines.slice(0, i + 1).join('\n');
                                        JSON.parse(validJson);
                                    } catch (e3) {
                                        if (i > 0) {
                                            validJson = lines.slice(0, i).join('\n');
                                            try {
                                                parsed = JSON.parse(validJson + ']');
                                                break;
                                            } catch (e4) {}
                                        }
                                    }
                                }
                                if (!parsed) throw new Error('AI返回的JSON格式有误，请减少生成数量后重试');
                            }
                        } else {
                            throw new Error('AI返回的不是有效的JSON格式');
                        }
                    }
                    if (!Array.isArray(parsed)) throw new Error('AI返回的不是有效的题目列表');
                    setPreview(parsed.map(q => ({
                        id: Math.random().toString(36).substr(2, 9),
                        type: type === '多选' ? '多选题' : '单选题',
                        stem: q.stem || '',
                        options: (q.options || []).map(o => o.replace(/^\s*[A-Za-z][\.、:\s]\s*/, '').trim()),
                        answer: (q.answer || '').toUpperCase().replace(/\s/g, ''),
                        analysis: q.analysis || '',
                        tags: q.tags ? String(q.tags).split(/[\s,，]+/).filter(Boolean) : [],
                        remark: '', practiceCount: 0, correctCount: 0, importTime: Date.now(),
                    })).filter(q => q.stem && q.options.length >= 2 && q.answer));
                    localStorage.setItem('choice_bank_ai_key_' + selectedProvider, apiKey);
                    localStorage.setItem('choice_bank_ai_url_' + selectedProvider, apiUrl);
                    localStorage.setItem('choice_bank_ai_model_' + selectedProvider, model);
                    localStorage.setItem('choice_bank_ai_provider', selectedProvider);
                } catch (e) { setInfoModal({ isOpen: true, title: '生成失败', message: e.message }); }
                finally { setLoading(false); }
            };

            const handleImport = () => {
                if (preview.length === 0) return;
                const existingKeys = new Set(questions.map(q => `${q.stem}|${q.options.join(',')}|${q.answer}`));
                const uniqueNew = preview.filter(q => !existingKeys.has(`${q.stem}|${q.options.join(',')}|${q.answer}`));
                setQuestions(prev => [...prev, ...uniqueNew]);
                setPreview([]);
                setInfoModal({ isOpen: true, title: '提示', message: `AI 生成导入完成：新增 ${uniqueNew.length} 道题目，跳过 ${preview.length - uniqueNew.length} 道重复题` });
            };

            const currentProvider = AI_PROVIDERS.find(p => p.name === selectedProvider);

            return (
                <div className="space-y-3 text-sm">
                    <div className="flex justify-between items-center">
                        <label className="text-xs opacity-50">AI 服务</label>
                        <button onClick={handleReset} className="text-[10px] text-themeRed hover:underline">恢复默认</button>
                    </div>
                    <div className="flex flex-wrap gap-1.5">
                        {AI_PROVIDERS.map(p => (
                            <button key={p.name} onClick={() => handleProviderChange(p.name)}
                                className={`px-2 py-0.5 text-[10px] border ${selectedProvider === p.name ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/20'}`}>{p.name}</button>
                        ))}
                    </div>
                    {currentProvider && <p className="text-[10px] opacity-40">{currentProvider.desc}</p>}
                    <div>
                        <label className="text-xs opacity-50 block mb-1">API Key</label>
                        <input className={THEME_CLASSES.input} type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder={selectedProvider === 'Ollama (本地)' ? '本地运行无需 Key' : 'sk-...'}/>
                    </div>
                    <div>
                        <label className="text-xs opacity-50 block mb-1">API 地址</label>
                        <input className={THEME_CLASSES.input} value={apiUrl} onChange={e => setApiUrl(e.target.value)}/>
                    </div>
                    <div>
                        <label className="text-xs opacity-50 block mb-1">模型名称</label>
                        <input className={THEME_CLASSES.input} value={model} onChange={e => setModel(e.target.value)}/>
                    </div>
                    <div>
                        <label className="text-xs opacity-50 block mb-1">生成主题 / 知识点</label>
                        <input className={THEME_CLASSES.input} value={topic} onChange={e => setTopic(e.target.value)} placeholder="例如：高中历史-抗日战争"/>
                    </div>

                                    <button key={d} onClick={() => setDifficulty(d)}

                                ))}
                            </div>
                        </div>
                    </div>
                    <div>
                        <label className="text-xs opacity-50 block mb-1">标签提示（可选，留空则不加标签）</label>
                        <input className={THEME_CLASSES.input} value={tagHint} onChange={e => setTagHint(e.target.value)} placeholder="例如：按教材章节分类"/>
                    </div>
                    <button onClick={handleGenerate} disabled={loading} className={THEME_CLASSES.button + " w-full py-2"}>
                        {loading ? '生成中...' : '开始生成'}
                    </button>
                    {preview.length > 0 && (
                        <div className="space-y-2 pt-2 border-t border-themeRed/10">
                            <p>生成了 <span className="text-themeRed font-bold">{preview.length}</span> 道题目</p>
                            <div className="max-h-48 overflow-y-auto custom-scrollbar space-y-1">
                                {preview.map((q, i) => (
                                    <div key={i} className="p-2 bg-white/20 rounded-sm text-xs">
                                        <div className="flex gap-1 items-start">
                                            <span className="text-themeRed font-bold flex-shrink-0">{i + 1}.</span>
                                            <span className="flex-1 truncate">{q.stem}</span>
                                            <span className="text-themeRed/40 flex-shrink-0 ml-1">{q.answer}</span>
                                        </div>
                                        {q.tags.length > 0 && <div className="flex gap-1 mt-0.5 ml-4">{q.tags.map(t => <span key={t} className="text-[9px] opacity-40">#{t}</span>)}</div>}
                                    </div>
                                ))}
                            </div>
                            <button onClick={handleImport} className={THEME_CLASSES.button + " w-full py-2"}>导入题库</button>
                        </div>
                    )}
                </div>
            );
        };

        const Home = ({ questions, filteredQuestions, searchQuery, setSearchQuery, filterTags, setFilterTags, filterDifficulty, setFilterDifficulty, filterQuestionType, setFilterQuestionType, allTags, setMode, setEditingQuestion, onImportClick, handleExportExcel, setQuestions, selectedIds, setSelectedIds, confirmDelete, confirmClear, setInfoModal, setFavorites, favorites }) => {
            const isAllSelected = filteredQuestions.length > 0 && selectedIds.length === filteredQuestions.length;
            const [batchTagInput, setBatchTagInput] = useState('');
            const [showBatchTag, setShowBatchTag] = useState(false);
            const [tagDeleteModal, setTagDeleteModal] = useState({ isOpen: false, tag: '' });
            const [tagDeleteConfirm, setTagDeleteConfirm] = useState(false);
            const [showAIModal, setShowAIModal] = useState(false);
            const [sortBy, setSortBy] = useState('');
            const [sortAsc, setSortAsc] = useState(false);
            const [page, setPage] = useState(1);
            const pageSize = 10;
            const [aiAnalysisModal, setAiAnalysisModal] = useState({ isOpen: false, question: null, loading: false, analysis: '', confirm: false, provider: '', showCompare: false, originalAnalysis: '' });
            const [aiSimilarModal, setAiSimilarModal] = useState({ isOpen: false, question: null, loading: false, questions: [], confirm: false, provider: '' });
            
            const sortedQuestions = useMemo(() => {
                if (!sortBy) return filteredQuestions;
                const sorted = [...filteredQuestions];
                sorted.sort((a, b) => {
                    let va, vb;
                    if (sortBy === 'practiceCount') { va = a.practiceCount; vb = b.practiceCount; }
                    else if (sortBy === 'wrongCount') { va = a.practiceCount - a.correctCount; vb = b.practiceCount - b.correctCount; }
                    else if (sortBy === 'correctRate') {
                        va = a.practiceCount > 0 ? a.correctCount / a.practiceCount : -1;
                        vb = b.practiceCount > 0 ? b.correctCount / b.practiceCount : -1;
                    }
                    else if (sortBy === 'importTime') { va = a.importTime || 0; vb = b.importTime || 0; }
                    else { va = 0; vb = 0; }
                    return sortAsc ? va - vb : vb - va;
                });
                return sorted;
            }, [filteredQuestions, sortBy, sortAsc]);
            
            const pagedQuestions = useMemo(() => {
                const start = (page - 1) * pageSize;
                return sortedQuestions.slice(start, start + pageSize);
            }, [sortedQuestions, page]);
            
            const totalPages = Math.ceil(sortedQuestions.length / pageSize);
            
            const handleSort = (key) => {
                if (sortBy === key) setSortAsc(prev => !prev);
                else { setSortBy(key); setSortAsc(false); setPage(1); }
            };
            
            useEffect(() => { setPage(1); }, [searchQuery, filterTags, filterDifficulty, filterQuestionType]);
            
            const batchAddTags = () => {
                const tags = batchTagInput.split(/[\s,，]+/).filter(Boolean);
                if (tags.length === 0) return;
                setQuestions(prev => prev.map(q => 
                    selectedIds.includes(q.id) ? { ...q, tags: [...new Set([...q.tags, ...tags])] } : q
                ));
                setBatchTagInput('');
                setShowBatchTag(false);
                setInfoModal({ isOpen: true, title: '提示', message: `已为 ${selectedIds.length} 道题目添加标签：${tags.join('、')}` });
            };

            const batchAddFavorites = () => {
                setFavorites(prev => [...new Set([...prev, ...selectedIds])]);
                setInfoModal({ isOpen: true, title: '提示', message: `已将 ${selectedIds.length} 道题目加入收藏` });
            };

            const batchRemoveFavorites = () => {
                setFavorites(prev => prev.filter(id => !selectedIds.includes(id)));
                setInfoModal({ isOpen: true, title: '提示', message: `已将 ${selectedIds.length} 道题目移出收藏` });
            };
            
            const handleTagToggle = (tag) => {
                if (tag === '收藏') {
                    setFilterTags(prev => prev.includes('收藏') ? prev.filter(i => i !== '收藏') : [...prev, '收藏']);
                } else {
                    setFilterTags(prev => prev.includes(tag) ? prev.filter(i => i !== tag) : [...prev, tag]);
                }
            };

            const handleTagDeleteClick = (tag, e) => {
                e.stopPropagation();
                e.preventDefault();
                setTagDeleteModal({ isOpen: true, tag });
                setTagDeleteConfirm(false);
            };

            const confirmDeleteTag = (action) => {
                const tag = tagDeleteModal.tag;
                if (tag === '收藏') {
                    if (action === 'remove') {
                        setFavorites([]);
                        setFilterTags(prev => prev.filter(t => t !== '收藏'));
                        setInfoModal({ isOpen: true, title: '提示', message: '已取消所有题目的收藏' });
                    } else if (action === 'delete') {
                        const count = favorites.length;
                        setQuestions(prev => prev.filter(q => !favorites.includes(q.id)));
                        setFavorites([]);
                        setFilterTags(prev => prev.filter(t => t !== '收藏'));
                        setInfoModal({ isOpen: true, title: '提示', message: `已删除 ${count} 道收藏题目` });
                    }
                } else {
                    if (action === 'remove') {
                        setQuestions(prev => prev.map(q => ({
                            ...q,
                            tags: q.tags.filter(t => t !== tag)
                        })));
                        setFilterTags(prev => prev.filter(t => t !== tag));
                        setInfoModal({ isOpen: true, title: '提示', message: `已移除所有题目的"${tag}"标签` });
                    } else if (action === 'delete') {
                        const count = questions.filter(q => q.tags.includes(tag)).length;
                        setQuestions(prev => prev.filter(q => !q.tags.includes(tag)));
                        setFilterTags(prev => prev.filter(t => t !== tag));
                        setInfoModal({ isOpen: true, title: '提示', message: `已删除含"${tag}"标签的 ${count} 道题目` });
                    }
                }
                setTagDeleteModal({ isOpen: false, tag: '' });
                setTagDeleteConfirm(false);
            };

            const getAIConfig = () => {
                const provider = localStorage.getItem('choice_bank_ai_provider') || 'DeepSeek';
                const key = localStorage.getItem('choice_bank_ai_key_' + provider) || '';
                const url = localStorage.getItem('choice_bank_ai_url_' + provider) || AI_PROVIDERS.find(p => p.name === provider)?.url || '';
                const model = localStorage.getItem('choice_bank_ai_model_' + provider) || AI_PROVIDERS.find(p => p.name === provider)?.model || '';
                return { key, url, model, provider };
            };

            const callAI = async (prompt) => {
                const { key, url, model, provider } = getAIConfig();
                if (!url) throw new Error('请先在 AI 生成试题中配置 API 地址');
                const headers = { 'Content-Type': 'application/json' };
                if (key) headers['Authorization'] = `Bearer ${key}`;
                const response = await fetch(url, {
                    method: 'POST', headers,
                    body: JSON.stringify({ model, messages: [{ role: 'user', content: prompt }], temperature: 0.7 }),
                });
                if (!response.ok) { const err = await response.json(); throw new Error(err.error?.message || `请求失败 (${response.status})`); }
                const data = await response.json();
                return { content: data.choices[0].message.content.trim(), provider };
            };

            const confirmAIAnalysis = (q) => {
                const { provider } = getAIConfig();
                setAiAnalysisModal({ isOpen: true, question: q, loading: false, analysis: '', confirm: true, provider, showCompare: false, originalAnalysis: q.analysis || '' });
            };

            const handleAIAnalysis = async () => {
                const q = aiAnalysisModal.question;
                const savedProvider = aiAnalysisModal.provider;
                const key = localStorage.getItem('choice_bank_ai_key_' + savedProvider) || '';
                const url = localStorage.getItem('choice_bank_ai_url_' + savedProvider) || AI_PROVIDERS.find(p => p.name === savedProvider)?.url || '';
                const model = localStorage.getItem('choice_bank_ai_model_' + savedProvider) || AI_PROVIDERS.find(p => p.name === savedProvider)?.model || '';
                if (!url) { setAiAnalysisModal(prev => ({ ...prev, loading: false, confirm: false, analysis: '请先在 AI 生成试题中配置 ' + savedProvider + ' 的 API 地址' })); return; }
                setAiAnalysisModal(prev => ({ ...prev, loading: true, confirm: false }));
                try {
                    const prompt = `请为以下选择题生成详细解析。

题干：${q.stem}
选项：
A. ${q.options[0]}
B. ${q.options[1]}
C. ${q.options[2]}
D. ${q.options[3]}
正确答案：${q.answer}

要求：
1. 不要使用任何markdown格式（不要用**、#、-等符号）
2. 不要使用"A选项"、"B选项"等字母代称，请直接引用选项的完整原文内容
3. 按以下格式输出：
【考点】指出本题考查的知识点
【解析】解释为什么正确答案是正确的，逐项分析其他选项为什么错误（引用选项原文）
【易错点】指出学生容易出错的地方
4. 语言简洁明了，适合学生理解`;
                    const headers = { 'Content-Type': 'application/json' };
                    if (key) headers['Authorization'] = `Bearer ${key}`;
                    const response = await fetch(url, {
                        method: 'POST', headers,
                        body: JSON.stringify({ model, messages: [{ role: 'user', content: prompt }], temperature: 0.7 }),
                    });
                    if (!response.ok) { const err = await response.json(); throw new Error(err.error?.message || `请求失败 (${response.status})`); }
                    const data = await response.json();
                    setAiAnalysisModal(prev => ({ ...prev, loading: false, analysis: data.choices[0].message.content.trim(), provider: savedProvider }));
                } catch (e) {
                    setAiAnalysisModal(prev => ({ ...prev, loading: false, analysis: '生成失败：' + e.message, provider: savedProvider }));
                }
            };

            const confirmAISimilar = (q) => {
                const { provider } = getAIConfig();
                setAiSimilarModal({ isOpen: true, question: q, loading: false, questions: [], confirm: true, provider });
            };

            const handleAISimilar = async () => {
                const q = aiSimilarModal.question;
                const savedProvider = aiSimilarModal.provider;
                const key = localStorage.getItem('choice_bank_ai_key_' + savedProvider) || '';
                const url = localStorage.getItem('choice_bank_ai_url_' + savedProvider) || AI_PROVIDERS.find(p => p.name === savedProvider)?.url || '';
                const model = localStorage.getItem('choice_bank_ai_model_' + savedProvider) || AI_PROVIDERS.find(p => p.name === savedProvider)?.model || '';
                if (!url) { setAiSimilarModal(prev => ({ ...prev, loading: false, confirm: false, error: '请先在 AI 生成试题中配置 ' + savedProvider + ' 的 API 地址' })); return; }
                setAiSimilarModal(prev => ({ ...prev, loading: true, confirm: false }));
                try {
                    const prompt = `请根据以下选择题，生成3道同考点的变体题（相似题）：

题干：${q.stem}
选项：
A. ${q.options[0]}
B. ${q.options[1]}
C. ${q.options[2]}
D. ${q.options[3]}
正确答案：${q.answer}
解析：${q.analysis || '无'}

要求：
1. 考查相同的知识点，但换一种出题角度
2. 每题4个选项，答案唯一
3. 附带简要解析
4. 不要使用任何markdown格式

请严格按以下JSON格式返回，不要包含任何其他文字：
[
  {
    "stem": "题干",
    "options": ["选项A", "选项B", "选项C", "选项D"],
    "answer": "A",
    "analysis": "解析"
  }
]`;
                    const headers = { 'Content-Type': 'application/json' };
                    if (key) headers['Authorization'] = `Bearer ${key}`;
                    const response = await fetch(url, {
                        method: 'POST', headers,
                        body: JSON.stringify({ model, messages: [{ role: 'user', content: prompt }], temperature: 0.7 }),
                    });
                    if (!response.ok) { const err = await response.json(); throw new Error(err.error?.message || `请求失败 (${response.status})`); }
                    const data = await response.json();
                    let content = data.choices[0].message.content.trim();
                    const jsonMatch = content.match(/```(?:json)?\s*([\s\S]*?)```/);
                    if (jsonMatch) content = jsonMatch[1].trim();
                    content = content.replace(/[""]/g, '"').replace(/['']/g, "'");
                    const parsed = JSON.parse(content);
                    if (!Array.isArray(parsed)) throw new Error('返回格式不正确');
                    const formatted = parsed.map(sq => ({
                        id: Math.random().toString(36).substr(2, 9),
                        type: sq.answer.length > 1 ? '多选题' : '单选题',
                        stem: sq.stem || '',
                        options: (sq.options || []).map(o => o.replace(/^\s*[A-Za-z][\.、:\s]\s*/, '').trim()),
                        answer: (sq.answer || '').toUpperCase().replace(/\s/g, ''),
                        analysis: sq.analysis || '',
                        tags: q.tags ? [...q.tags] : [],
                        remark: `相似题来源：${q.stem.substring(0, 30)}...`,
                        practiceCount: 0, correctCount: 0, importTime: Date.now(),
                    })).filter(sq => sq.stem && sq.options.length >= 2 && sq.answer);
                    setAiSimilarModal(prev => ({ ...prev, loading: false, questions: formatted, provider: savedProvider }));
                } catch (e) {
                    setAiSimilarModal(prev => ({ ...prev, loading: false, questions: [], error: e.message, provider: savedProvider }));
                }
            };

            const importSimilarQuestions = () => {
                const existingKeys = new Set(questions.map(q => `${q.stem}|${q.options.join(',')}|${q.answer}`));
                const uniqueNew = aiSimilarModal.questions.filter(q => !existingKeys.has(`${q.stem}|${q.options.join(',')}|${q.answer}`));
                setQuestions(prev => [...prev, ...uniqueNew]);
                setInfoModal({ isOpen: true, title: '提示', message: `相似题导入完成：新增 ${uniqueNew.length} 道题目` });
                setAiSimilarModal({ isOpen: false, question: null, loading: false, questions: [] });
            };
            
            return (
                <div className="space-y-4">
                    <div className={THEME_CLASSES.card}>
                        <div className="flex flex-wrap gap-3 mb-4">
                            <button onClick={() => {setEditingQuestion(null); setMode('edit')}} className={THEME_CLASSES.button}><Icons.Plus/> 新增题目</button>
                            <button onClick={onImportClick} className={THEME_CLASSES.secondaryButton}><Icons.Upload/> 导入题库</button>
                            <button onClick={() => setMode('text_import')} className={THEME_CLASSES.secondaryButton}><Icons.FileText/> 文本导入</button>
                            <button onClick={() => setShowAIModal(true)} className={THEME_CLASSES.secondaryButton}><Icons.Plus/> AI生成</button>
                            <button onClick={handleExportExcel} className={THEME_CLASSES.secondaryButton}><Icons.Download/> 导出题库</button>
                            {questions.length > 0 && <button onClick={confirmClear} className="px-4 py-1.5 border border-red-700 text-red-700 font-serif hover:bg-red-50 transition-all text-sm flex items-center gap-2"><Icons.Eraser/> 清空题库</button>}
                            <div className="flex-1"></div>
                            {selectedIds.length > 0 && (
                                <div className="flex items-center gap-2 flex-wrap">
                                    <span className="text-xs text-themeRed font-bold">已选 {selectedIds.length} 题</span>
                                    <button onClick={() => confirmDelete(selectedIds)} className="px-3 py-1 bg-red-700 text-white font-serif text-sm flex items-center gap-1">
                                        <Icons.Trash className="w-3 h-3"/> 删除
                                    </button>
                                    <button onClick={batchAddFavorites} className="px-3 py-1 border border-yellow-500 text-yellow-600 font-serif text-sm flex items-center gap-1 hover:bg-yellow-50">
                                        <Icons.Star className="w-3 h-3"/> 收藏
                                    </button>
                                    <button onClick={batchRemoveFavorites} className="px-3 py-1 border border-themeRed/20 text-themeRed/60 font-serif text-sm flex items-center gap-1 hover:bg-themeRed/5">
                                        <Icons.Star className="w-3 h-3"/> 取消收藏
                                    </button>
                                    <button onClick={() => setShowBatchTag(!showBatchTag)} className="px-3 py-1 border border-themeRed/20 text-themeRed font-serif text-sm flex items-center gap-1 hover:bg-themeRed/5">
                                        <Icons.Plus className="w-3 h-3"/> 添加标签
                                    </button>
                                </div>
                            )}
                        </div>
                        {showBatchTag && (
                            <div className="flex gap-2 items-center mb-3 p-2 bg-themeRed/5 border border-themeRed/10 rounded-sm">
                                <span className="text-xs text-themeRed flex-shrink-0">批量标签：</span>
                                <input className={THEME_CLASSES.input + " flex-1"} placeholder="输入标签，逗号或空格分隔" value={batchTagInput} onChange={e => setBatchTagInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && batchAddTags()}/>
                                <button onClick={batchAddTags} className={THEME_CLASSES.button}>确认</button>
                                <button onClick={() => { setShowBatchTag(false); setBatchTagInput(''); }} className={THEME_CLASSES.secondaryButton}>取消</button>
                            </div>
                        )}
                        <div className="space-y-3">
                            <div className="flex items-start gap-3">
                                <div className="relative md:flex-1">
                                    <Icons.Search className="absolute left-2 top-1/2 -translate-y-1/2 opacity-30 w-4 h-4"/>
                                    <input className={THEME_CLASSES.input + " pl-8"} placeholder="搜索题目、备注关键词..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}/>
                                </div>
                                <div className="relative md:w-32 flex-shrink-0">
                                    <select className={THEME_CLASSES.input + " pr-8"} value={filterDifficulty[0] || ""} onChange={e => setFilterDifficulty(e.target.value ? [e.target.value] : [])}>
                                        <option value="">所有难度</option>
                                        <option value="未练习">未练习</option><option value="易">易</option><option value="中">中</option><option value="难">难</option>
                                    </select>
                                </div>
                            </div>
                            <div className="flex flex-wrap gap-2 items-center">
                                <span className="text-[10px] opacity-40 flex-shrink-0">筛选：</span>
                                {favorites.length > 0 && (
                                    <button key="收藏" onClick={() => handleTagToggle('收藏')}
                                        className={`px-2 py-0.5 text-xs border transition-all relative group ${filterTags.includes('收藏') ? 'bg-yellow-500 text-white border-yellow-500' : 'border-yellow-500/40 text-yellow-600 hover:border-yellow-500'}`}>
                                        收藏
                                        {filterTags.includes('收藏') && <span onClick={(e) => handleTagDeleteClick('收藏', e)} className="ml-0.5 opacity-60 hover:opacity-100 text-[10px] leading-none cursor-pointer">&times;</span>}
                                    </button>
                                )}
                                {allTags.map(t => (
                                    <button key={t} onClick={() => handleTagToggle(t)}
                                        className={`px-2 py-0.5 text-xs border transition-all relative ${filterTags.includes(t) ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/20 hover:border-themeRed/40'}`}>
                                        {t}
                                        {filterTags.includes(t) && <span onClick={(e) => handleTagDeleteClick(t, e)} className="ml-0.5 opacity-60 hover:opacity-100 text-[10px] leading-none cursor-pointer">&times;</span>}
                                    </button>
                                ))}
                            </div>
                            <div className="flex flex-wrap gap-2 items-center">
                                <span className="text-[10px] opacity-40 flex-shrink-0">题型：</span>
                                {['单选', '多选'].map(t => (
                                    <button key={t} onClick={() => setFilterQuestionType(prev => prev.includes(t) ? prev.filter(i => i !== t) : [...prev, t])}
                                        className={`px-2 py-0.5 text-xs border transition-all ${filterQuestionType.includes(t) ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/20 hover:border-themeRed/40'}`}>{t}</button>
                                ))}
                            </div>
                            <div className="flex flex-wrap gap-2 items-center">
                                <span className="text-[10px] opacity-40 flex-shrink-0">排序：</span>
                                {[
                                    { key: '', label: '默认' },
                                    { key: 'practiceCount', label: '练习次数' },
                                    { key: 'wrongCount', label: '答错次数' },
                                    { key: 'correctRate', label: '正确率' },
                                    { key: 'importTime', label: '导入时间' },
                                ].map(s => (
                                    <button key={s.key} onClick={() => handleSort(s.key)}
                                        className={`px-2 py-0.5 text-xs border transition-all ${sortBy === s.key ? 'bg-themeRed text-white border-themeRed' : 'border-themeRed/20 hover:border-themeRed/40'}`}>
                                        {s.label}{sortBy === s.key && s.key ? (sortAsc ? ' ↑' : ' ↓') : ''}
                                    </button>
                                ))}
                            </div>
                        </div>

                                <p>AI 正在生成解析...</p>

                        ) : (

                                    <p className="text-xs font-bold mb-1">{aiAnalysisModal.question?.stem}</p>
                                    <p className="text-[10px] opacity-50">答案：{aiAnalysisModal.question?.answer}</p>
                                </div>
                                {aiAnalysisModal.showCompare && aiAnalysisModal.originalAnalysis ? (
                                    <div className="space-y-2">
                                        <div className="flex justify-between items-center">
                                            <span className="text-xs font-bold text-themeRed">对比新旧解析</span>
                                            <button onClick={() => setAiAnalysisModal(prev => ({ ...prev, showCompare: false }))} className="text-[10px] text-themeRed hover:underline">返回</button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2 text-xs">
                                            <div className="p-2 border border-themeRed/10 rounded-sm">
                                                <p className="font-bold mb-1 text-themeRed">原解析</p>
                                                <div className="max-h-40 overflow-y-auto custom-scrollbar whitespace-pre-wrap opacity-60">{aiAnalysisModal.originalAnalysis || '无'}</div>

                                            <div className="p-2 border border-themeRed/10 rounded-sm">

                                        {cleanMarkdown(aiAnalysisModal.analysis).split('\n').map((line, i) => (
                                            <div key={i} className={line.startsWith('【') ? 'mt-2 mb-1 font-bold' : 'mb-1'}>{line || <br/>}</div>
                                        ))}

                                    </select>

                                    <button onClick={() => setAiSimilarModal({ isOpen: false, question: null, loading: false, questions: [], confirm: false, provider: '' })} className={THEME_CLASSES.secondaryButton + " flex-1"}>取消</button>
                                    <button onClick={handleAISimilar} className={THEME_CLASSES.button + " flex-1"}>确认生成</button>

                                    {aiSimilarModal.questions.map((q, i) => (
                                        <div key={i} className="p-3 bg-white/30 border border-themeRed/10 rounded-sm text-xs">
                                            <p className="font-bold mb-1">{i + 1}. {q.stem}</p>
                                            {q.options.map((o, j) => <p key={j} className="ml-4 opacity-70">{String.fromCharCode(65 + j)}. {o}</p>)}
                                            <p className="mt-1 text-themeRed">答案：{q.answer}</p>

        const Edit = ({ editingQuestion, saveQuestion, setMode }) => {
            const [form, setForm] = useState(editingQuestion || { 
                stem: '', options: ['', '', '', ''], answer: '', analysis: '', tags: [], 
                practiceCount: 0, correctCount: 0, remark: ''
            });
            const [tagInput, setTagInput] = useState(form.tags.join(','));
            const [showPreview, setShowPreview] = useState(false);

            const handleSave = (e) => {
                if (e) e.preventDefault();
                const finalTags = tagInput.split(/[\s,，]+/).filter(Boolean);
                saveQuestion({ ...form, tags: finalTags });
            };

            const addOption = () => {
                if (form.options.length < 10) {
                    setForm({ ...form, options: [...form.options, ''] });
                }
            };

            const removeOption = (index) => {
                if (form.options.length > 2) {
                    const newOptions = form.options.filter((_, i) => i !== index);
                    setForm({ ...form, options: newOptions });
                }
            };

            if (showPreview) {
                const validOptions = form.options.filter(o => o.trim());
                const displayOptions = validOptions.map((text, idx) => ({ text, originalLetter: String.fromCharCode(65 + idx) }));
                return (
                    <div className="max-w-2xl mx-auto space-y-4">
                        <div className="flex justify-between items-center">
                            <h2 className={THEME_CLASSES.title}>题目预览</h2>
                            <button onClick={() => setShowPreview(false)} className={THEME_CLASSES.secondaryButton}>返回编辑</button>

                        <div className={THEME_CLASSES.card + " space-y-6"}>

                            <p className="text-lg leading-relaxed">{form.stem || '（题干为空）'}</p>
                            <div className="space-y-2">
                                {displayOptions.map((opt, i) => (
                                    <div key={i} className="w-full text-left p-3 border border-themeRed/10 flex items-center gap-3">
                                        <span className="w-6 h-6 flex items-center justify-center border border-themeRed/20 rounded-full text-xs">{String.fromCharCode(65 + i)}</span>
                                        {opt.text || '（选项为空）'}

                                ))}
